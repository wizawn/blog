name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["main", "master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true
      
      - name: Build
        run: hugo --gc --minify --forceSyncStatic
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: cfut_J5ao00LlhVhIUsnpiqaMZ0CebhgzFjao5FyNrkF702270dab
          accountId: 538536fdc38937e7ff08f5aac3a6ffa7
          command: deploy
