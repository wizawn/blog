  - https://nvd.nist.gov/vuln/detail/cve-2020-9480
  remediation: 'Update to Spark 2.4.6 or later to fix the vulnerability.

    '
  severity: critical
  tags: cve,cve2020,apache,spark,auth-bypass,vkev,vuln
