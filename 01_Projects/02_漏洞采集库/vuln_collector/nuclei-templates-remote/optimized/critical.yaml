id: CVE-2025-32101
info:
  author: iamnoooob,rootxharsh,pdresearch
  description: 'The vulnerability is located in the /template/scripts/BxBaseMenuSetAclLevel.php
    script. Specifically, within the BxBaseMenuSetAclLevel::getCode() method. When
    calling this method, user input passed through the "profile_id" POST parameter
    is not properly sanitized before being used in a call to the unserialize() PHP
    function. This can be exploited by remote, unauthenticated attackers to inject
    arbitrary PHP objects into the application scope, allowing them to perform a variety
    of attacks, such as writing and executing arbitrary PHP code.

    '
  impact: 'Unauthenticated attackers can inject arbitrary PHP objects through the
    profile_id parameter, allowing remote code execution and complete server compromise.

    '
  metadata:
    fofa-query: body="Powered by UNA"
    max-request: 3
    verified: true
  name: UNA CMS <= 14.0.0-RC4 - PHP Object Injection
  reference:
  - https://www.exploit-db.com/exploits/52139
  - https://karmainsecurity.com/KIS-2025-01
  remediation: 'Upgrade to UNA CMS version 14.0.0 or later that properly validates
    and sanitizes serialized input.

    '
  severity: critical
  tags: cve,cve2025,una-cms,php,rce,vuln
