- matchers:
  - dsl:
    - contains_any(tolower(response), "prestashop", "tvcmsblog")
    internal: true
    type: dsl
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    '
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - duration_1>=10
    - status_code_1 == 200 && contains(body_1, "tvcmsblog")
    name: time-based
    type: dsl
  - condition: and
    dsl:
    - status_code_2 == 200 && contains(body_2, "tvcmsblog")
    - status_code_2 == 200 && status_code_3 == 302
    name: blind-based
    type: dsl
