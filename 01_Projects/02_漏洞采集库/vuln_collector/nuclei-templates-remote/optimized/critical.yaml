id: CVE-2025-48828
info:
  author: DhiyaneshDK, Chocapikk
  classification:
    cpe: cpe:2.3:a:vbulletin:vbulletin:*:*:*:*:*:*:*:*
    cve-id: CVE-2025-48828
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10
    cwe-id: CWE-424
    epss-percentile: 0.98789
    epss-score: 0.73998
  description: 'vBulletin versions 5.0.0 through 6.0.3 contain a Remote Code Execution
    (RCE) vulnerability in the ajax/api/ad/replaceAdTemplate endpoint. This flaw arises
    from improper use of PHP''s Reflection API, allowing unauthenticated attackers
    to invoke protected controller methods. By injecting a crafted <vb:if> conditional
    that executes arbitrary PHP code via passthru($_POST[<param>]), and triggering
    it with a second request to ajax/render/ad_<location>, attackers can run arbitrary
    commands on the server as the webserver user.

    '
  impact: 'Successful exploitation allows unauthenticated remote attackers to execute
    arbitrary system commands as the web server user, resulting in full system compromise.

    '
  metadata:
    fofa-query: app="vBulletin"
    max-request: 1
    product: vbulletin
    shodan-query: http.component:"vBulletin"
    vendor: vbulletin
    verified: true
  name: vBulletin replaceAdTemplate - Remote Code Execution
  reference:
  - https://karmainsecurity.com/pocs/vBulletin-replaceAdTemplate-RCE.php
  - https://karmainsecurity.com/dont-call-that-protected-method-vbulletin-rce
  - https://nvd.nist.gov/vuln/detail/CVE-2025-48827
  - https://nvd.nist.gov/vuln/detail/CVE-2025-48828
  remediation: 'Upgrade to vBulletin 6.0.4+ and apply the official patch to restrict
    access to protected controller methods and secure the ajax/api/ad/replaceAdTemplate
    endpoint.

    '
  severity: critical
  tags: cve,cve2025,rce,vbulletin,intrusive,vkev,vuln
