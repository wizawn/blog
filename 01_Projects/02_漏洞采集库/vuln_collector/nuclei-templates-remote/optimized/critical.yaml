id: CVE-2025-23061
info:
  author: NamhyunKo
  classification:
    cpe: cpe:2.3:a:mongoosejs:mongoose:*:*:*:*:*:node.js:*:*
    cve-id: CVE-2025-23061
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 9.0
    cwe-id: CWE-94
    epss-percentile: 0.98416
    epss-score: 0.64791
  description: 'NoSQL injection vulnerability in Mongoose < 8.9.5 affecting the populate()
    function''s match option. This vulnerability exists due to an incomplete fix for
    CVE-2024-53900. While direct $where injection is blocked, attackers can bypass
    this protection by nesting $where operators within logical operators like $and,
    allowing execution of arbitrary JavaScript code on MongoDB server, bypassing authentication,
    and accessing sensitive administrative data.

    '
  impact: 'Attackers can bypass authentication and execute arbitrary JavaScript code
    on MongoDB servers through nested $where operators in the populate() function,
    potentially accessing sensitive administrative data and compromising database
    integrity.

    '
  metadata:
    fofa-query: title="Mongoose"
    max-request: 1
    shodan-query: title:"Mongoose"
    verified: true
  name: Mongoose - NoSQL Injection
  reference:
  - https://github.com/Automattic/mongoose/commit/64a9f9706f2428c49e0cfb8e223065acc645f7bc
  - https://github.com/Automattic/mongoose/releases/tag/8.9.5
  - https://github.com/NamhyeonKo/mongoose-cve-lab
  - https://nvd.nist.gov/vuln/detail/CVE-2025-23061
  remediation: 'Upgrade to Mongoose version 8.9.5 or later that properly blocks nested
    $where operators.

    '
  severity: critical
  tags: cve,cve2025,nosql,mongoose,nodejs,vuln
---
http:
