id: CVE-2025-47916
info:
  author: EgiX,iamnoooob,pdresearch
  classification:
    cve-id: CVE-2025-47916
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10
    cwe-id: CWE-1336
    epss-percentile: 0.99565
    epss-score: 0.89988
  description: 'Invision Community 5.0.0 before 5.0.7 allows remote code execution
    via crafted template strings to themeeditor.php. The issue lies within the themeeditor
    controller (/applications/core/modules/front/system/themeeditor.php), where a
    protected method named customCss can be invoked by unauthenticated users. This
    method passes the value of the content parameter to the Theme::makeProcessFunction()
    method, which is evaluated by the template engine. Accordingly, unauthenticated
    attackers can inject and execute arbitrary PHP code by providing crafted template
    strings.

    '
  impact: 'Unauthenticated attackers can inject and execute arbitrary PHP code through
    the content parameter in themeeditor.php, achieving complete server compromise.

    '
  metadata:
    fofa-query: body="Invision" && body="ips4"
    max-request: 1
    shodan-query: 'Set-Cookie: ips4_'
    verified: true
  name: Invision Community <=5.0.6 Unauthenticated RCE via Template Injection
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2025-47916
  - https://karmainsecurity.com/pocs/CVE-2025-47916.php
  - https://invisioncommunity.com/release-notes-v5/507-r41/
  - https://karmainsecurity.com/KIS-2025-02
  - http://seclists.org/fulldisclosure/2025/May/4
  remediation: 'Upgrade Invision Community to version 5.0.7 or later that properly
    sanitizes template strings before evaluation.

    '
  severity: critical
  tags: cve,cve2025,invision,rce,ssti,unauth,seclists,vkev,vuln
