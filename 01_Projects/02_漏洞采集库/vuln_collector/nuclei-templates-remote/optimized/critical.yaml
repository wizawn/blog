    - icon_hash=1701804003
    - title="servicenow"
    google-query: intitle:"servicenow"
    max-request: 1
    product: servicenow
    shodan-query:
    - http.favicon.hash:"1701804003"
    - http.title:"servicenow"
    vendor: servicenow
    verified: true
  name: ServiceNow UI Macros - Template Injection
  reference:
