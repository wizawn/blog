id: CVE-2025-4009
info:
  author: ONEKEY,iamnoooob,pdresearch
  classification:
    cvss-metrics: CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:H/SC:N/SI:N/SA:N/S:N/AU:Y/V:C
    cvss-score: 9.3
    epss-percentile: 0.89555
    epss-score: 0.05071
  description: 'The Evertz SDVN 3080ipx-10G is a High Bandwidth Ethernet Switching
    Fabric for Video Application. This device exposes a web management interface on
    port 80. This web management interface can be used by administrators to control
    product features, setup network switching, and register license among other features.
    The application has been developed in PHP with the webEASY SDK, also named ‘ewb’
    by Evertz.This web interface has two endpoints that are vulnerable to arbitrary
    command injection and the authentication mechanism has a flaw leading to authentication
    bypass.Remote unauthenticated attackers can gain arbitrary command execution with
    elevated privileges ( root ) on affected devices.This level of access could lead
    to serious business impact such as the interruption of media streaming, modification
    of media being streamed, alteration of closed captions being generated, among
    others.

    '
  impact: 'Unauthenticated attackers can bypass authentication and execute arbitrary
    commands with root privileges, potentially disrupting media streaming or manipulating
    content.

    '
  metadata:
    max-request: 1
    shodan-query: html:"evertz.min.css"
    verified: true
