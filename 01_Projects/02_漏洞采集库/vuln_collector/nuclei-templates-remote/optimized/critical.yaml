  description: 'The Realtyna Organic IDX plugin plugin for WordPress is vulnerable
    to SQL Injection in versions up to, and including, 4.14.4 due to insufficient
    escaping on the user supplied parameter and lack of sufficient preparation on
    the existing SQL query. This makes it possible for unauthenticated attackers to
    append additional SQL queries into already existing queries that can be used to
    extract sensitive information from the database.

    '
  impact: 'Attackers can execute arbitrary SQL commands, potentially leading to data
    theft, data tampering, or database compromise.

    '
  metadata:
    max-request: 2
    publicwww-query: plugins/real-estate-listing-realtyna-wpl
    verified: true
