info:
  author: DhiyaneshDk,ritikchaddha
  classification:
    epss-percentile: 0.99955
    epss-score: 0.94349
  description: 'ServiceNow has addressed an input validation vulnerability that was
    identified in Vancouver and Washington DC Now Platform releases. This vulnerability
    could enable an unauthenticated user to remotely execute code within the context
    of the Now Platform. ServiceNow applied an update to hosted instances, and ServiceNow
    released the update to our partners and self-hosted customers. Listed below are
    the patches and hot fixes that address the vulnerability. If you have not done
    so already, we recommend applying security patches relevant to your instance as
    soon as possible.

    '
  impact: 'Unauthenticated attackers can exploit SSTI to execute arbitrary code on
    ServiceNow servers.

    '
