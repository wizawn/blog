id: CVE-2019-2729
info:
  author: igibanez
  classification:
    cpe: cpe:2.3:a:oracle:communications_diameter_signaling_router:8.0:*:*:*:*:*:*:*
    cve-id: CVE-2019-2729
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-284
    epss-percentile: 0.99961
    epss-score: 0.94364
  description: 'The Oracle WebLogic Server component of Oracle Fusion Middleware (subcomponent:
    Web Services) versions 0.3.6.0.0, 12.1.3.0.0 and 12.2.1.3.0 contain an easily
    exploitable vulnerability that allows unauthenticated attackers with network access
    via HTTP to compromise Oracle WebLogic Server.

    '
  impact: 'Successful exploitation of this vulnerability could allow an attacker to
    execute arbitrary code on the affected system.

    '
  metadata:
    max-request: 3
    product: communications_diameter_signaling_router
    vendor: oracle
  name: Oracle WebLogic Server Administration Console - Remote Code Execution
  reference:
  - https://www.oracle.com/security-alerts/alert-cve-2019-2729.html
  - https://nvd.nist.gov/vuln/detail/CVE-2019-2729
  - http://www.oracle.com/technetwork/security-advisory/alert-cve-2019-2729-5570780.html
