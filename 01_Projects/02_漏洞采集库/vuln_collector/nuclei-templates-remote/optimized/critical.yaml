      (empty) zip file. This is a safe method for checking vulnerability and will
      not cause data loss or database reset. In real attack scenarios, a malicious
      file could potentially be used causing more severe impacts.
    product: confluence_data_center
    shodan-query:
    - http.component:"Atlassian Confluence"
    - http.component:"atlassian confluence"
