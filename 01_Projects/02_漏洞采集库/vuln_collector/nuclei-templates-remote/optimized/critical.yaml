    \ %>\n<%@ Import Namespace=\"System.Text\" %>\n<%@ Import Namespace=\"System.IO\"\
    \ %>\n\n<script runat=\"server\">\nvoid Page_Load() {\n    byte[] bytes = Encoding.UTF8.GetBytes(\"\
    {{num}}\");\n    byte[] hash = MD5.Create().ComputeHash(bytes);\n    Response.Write(BitConverter.ToString(hash).Replace(\"\
