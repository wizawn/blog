id: CVE-2025-0868
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    epss-percentile: 0.9461
    epss-score: 0.16047
  description: 'A vulnerability, that could result in Remote Code Execution (RCE),
    has been found in DocsGPT. Due to improper parsing of JSON data using eval() an
    unauthorized attacker could send arbitrary Python code to be executed via /api/remote
    endpoint.This issue affects DocsGPT- from 0.8.1 through 0.12.0.

    '
  impact: 'Unauthenticated attackers can execute arbitrary Python code remotely on
    DocsGPT servers through improper eval() usage, leading to complete system compromise
    and potential access to all indexed documents and API keys.

    '
  metadata:
    fofa-query: body="Welcome to DocsGPT"
    max-request: 1
    verified: true
  name: DocsGPT - Unauthenticated Remote Code Execution
  reference:
  - https://cert.pl/posts/2025/02/CVE-2025-0868/
  - https://cert.pl/en/posts/2025/02/CVE-2025-0868/
  - https://github.com/arc53/DocsGPT
  remediation: 'Upgrade to DocsGPT version 0.12.1 or later that addresses the eval()
    vulnerability.

    '
  severity: critical
  tags: cve,cve2025,docsgpt,unauth,rce,vkev,vuln
