  - https://github.com/vercel/next.js/security/advisories/GHSA-f82v-jwr5-mffw
  - https://slcyber.io/assetnote-security-research-center/doing-the-due-diligence-analysing-the-next-js-middleware-bypass-cve-2025-29927/
  remediation: 'Upgrade to Next.js 14.2.25 or 15.2.3 or later. If upgrading is not
    possible, block the x-middleware-subrequest header at the WAF or server level.

    '
