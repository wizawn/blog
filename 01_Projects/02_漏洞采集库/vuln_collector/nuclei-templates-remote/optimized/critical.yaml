    1

    -----------------------------266856663522356381601517168829

    Content-Disposition: form-data; name="message"


    <img src="https://11111.{{interactsh-url}}">

    -----------------------------266856663522356381601517168829

    Content-Disposition: form-data; name="draft_id"



    -----------------------------266856663522356381601517168829--

    '
- matchers:
  - condition: and
