id: CVE-2025-34300
info:
  author: assetnote,DhiyaneshDK,iamnoooob
  classification:
    cve-id: CVE-2025-34300
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-1336,CWE-20
    epss-percentile: 0.98805
    epss-score: 0.74297
  description: 'A pre-authentication remote code execution vulnerability exists in
    Sawtooth Software’s Lighthouse Studio versions prior to 9.16.14. The issue arises
    from the unsafe use of the `eval` function within the Perl CGI component `ciwweb.pl`,
    where attacker-supplied input inside `hid_Random_ACARAT` is directly passed to
    `eval`. This allows remote unauthenticated attackers to execute arbitrary Perl
    code on the server.

    '
  impact: 'Unauthenticated attackers can execute arbitrary Perl code through the hid_Random_ACARAT
    parameter due to unsafe eval usage, achieving complete server compromise.

    '
  metadata:
    max-request: 1
    shodan-query: html:"Lighthouse Studio"
    verified: true
  name: SawtoothSoftware Lighthouse Studio < 9.16.14 - Pre-Auth Remote Code Execution
  reference:
  - https://slcyber.io/assetnote-security-research-center/rce-in-the-most-popular-survey-software-youve-never-heard-of/
  - https://sawtoothsoftware.com/resources/software-downloads/lighthouse-studio
  - https://nvd.nist.gov/vuln/detail/CVE-2025-34300
  remediation: 'Upgrade to Sawtooth Software Lighthouse Studio version 9.16.14 or
    later that removes unsafe eval usage in ciwweb.pl.

    '
  severity: critical
  tags: cve,cve2025,lighthouse-studio,sawtoothsoftware,rce,ssti,vkev,vuln
