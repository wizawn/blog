    cvss-score: 9.8
    cwe-id: CWE-798
    epss-percentile: 0.99549
    epss-score: 0.89723
  description: GitLab CE/EE contains a hard-coded credentials vulnerability. A hardcoded
    password was set for accounts registered using an OmniAuth provider (e.g. OAuth,
    LDAP, SAML), allowing attackers to potentially take over accounts. This template
    attempts to passively identify vulnerable versions of GitLab without the need
    for an exploit by matching unique hashes for the application-<hash>.css file in
    the header for unauthenticated requests. Positive matches do not guarantee exploitability.
    Affected versions are 14.7 prior to 14.7.7, 14.8 prior to 14.8.5, and 14.9 prior
    to 14.9.2.
  impact: 'Successful exploitation of this vulnerability can lead to unauthorized
    access to sensitive information or unauthorized actions within the GitLab application.

    '
  metadata:
    fofa-query: title="gitlab"
    google-query: intitle:"gitlab"
    max-request: 1
    product: gitlab
    shodan-query:
    - http.title:"GitLab"
    - cpe:"cpe:2.3:a:gitlab:gitlab"
    - http.title:"gitlab"
    vendor: gitlab
  name: GitLab CE/EE - Hard-Coded Credentials
  reference:
  - https://gitlab.com/gitlab-com/gl-security/threatmanagement/redteam/redteam-public/cve-hash-harvester
  - https://gitlab.com/gitlab-org/cves/-/blob/master/2022/CVE-2022-1162.json
  - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2022-1162
  - http://packetstormsecurity.com/files/166828/Gitlab-14.9-Authentication-Bypass.html
  - https://nvd.nist.gov/vuln/detail/cve-2022-1162
  remediation: Tooling to find relevant hashes based on the semantic version ranges
    specified in the CVE is linked in the reference section below.
  severity: critical
  tags: cve,cve2022,gitlab,packetstorm,vuln
