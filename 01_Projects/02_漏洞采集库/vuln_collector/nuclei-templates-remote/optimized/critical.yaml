id: CVE-2023-40504
info:
  author: s4e-io
  classification:
    cve-id: CVE-2023-40504
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-78
    epss-percentile: 0.99636
    epss-score: 0.91198
  description: 'LG Simple Editor readVideoInfo Command Injection Remote Code Execution
    Vulnerability. This vulnerability allows remote attackers to execute arbitrary
    code on affected installations of LG Simple Editor. Authentication is not required
    to exploit this vulnerability. The specific flaw exists within the readVideoInfo
    method. The issue results from the lack of proper validation of a user-supplied
    string before using it to execute a system call. An attacker can leverage this
    vulnerability to execute code in the context of SYSTEM.

    '
  impact: 'Unauthenticated attackers can execute arbitrary commands with SYSTEM privileges
    through the readVideoInfo method by injecting malicious strings in system calls,
    potentially compromising the entire LG Simple Editor server and connected systems.

    '
  metadata:
    fofa-query: icon_hash="159985907"
    max-request: 1
    product: simple_editor
    vendor: lg
    verified: true
  name: LG Simple Editor <= v3.21.0 - Command Injection
  reference:
  - https://www.zerodayinitiative.com/advisories/ZDI-23-1208/
  - https://packetstormsecurity.com/files/180171/LG-Simple-Editor-3.21.0-Command-Injection.html
  - https://0day.today/exploit/39719
  - https://www.usom.gov.tr/bildirim/tr-24-0417
  - https://nvd.nist.gov/vuln/detail/CVE-2023-40504
  remediation: 'Update LG Simple Editor to a version newer than 3.21.0 that properly
    validates user input and prevents command injection in the readVideoInfo method.

    '
  severity: critical
  tags: cve,cve2023,lg,simple-editor,intrusive,rce,file-upload,vuln
