  description: 'Wing FTP Server versions prior to 7.4.4 are vulnerable to an unauthenticated
    remote code execution (RCE) flaw (CVE-2025-47812).

    The vulnerability arises from improper NULL byte handling in the ''username''
    parameter during login, which allows Lua code injection

    into session files. These injected session files are executed when accessing authenticated
    endpoints such as /dir.html, resulting

    in arbitrary command execution with elevated privileges. This attack is possible
    only when anonymous login is enabled on the server.

    '
  impact: 'Unauthenticated attackers can inject and execute Lua code through NULL
    byte handling in the username parameter when anonymous login is enabled, achieving
    remote code execution with elevated privileges.

    '
