id: CVE-2025-2294
info:
  author: s4e-io
  classification:
    cve-id: CVE-2025-2294
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-22
    epss-percentile: 0.97925
    epss-score: 0.53731
  description: 'The Kubio AI Page Builder plugin for WordPress is vulnerable to Local
    File Inclusion in all versions up to, and including, 2.5.1 via thekubio_hybrid_theme_load_template
    function. This makes it possible for unauthenticated attackers to include and
    execute arbitrary files on the server, allowing the execution of any PHP code
    in those files. This can be used to bypass access controls, obtain sensitive data,
    or achieve code execution in cases where images and other “safe” file types can
    be uploaded and included.

    '
  impact: 'Unauthenticated attackers can include and execute arbitrary files through
    the kubio_hybrid_theme_load_template function, allowing arbitrary PHP code execution
    and potential complete server compromise.

    '
  metadata:
    fofa-query: body="wp-content/plugins/kubio/"
    max-request: 2
    verified: true
  name: Kubio AI Page Builder <= 2.5.1 - Local File Inclusion
  reference:
  - https://github.com/Nxploited/CVE-2025-2294
  - https://plugins.trac.wordpress.org/browser/kubio/tags/2.5.1/lib/integrations/third-party-themes/editor-hooks.php#L32
  - https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/kubio/kubio-ai-page-builder-251-unauthenticated-local-file-inclusion
  remediation: 'Fixed in 2.5.2

    '
  severity: critical
  tags: cve,cve2025,wp,wordpress,wp-plugin,lfi,kubio,vkev,vuln
