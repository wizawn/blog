id: CVE-2025-34143
info:
  author: slcyber,DhiyaneshDK
  classification:
    cve-id: CVE-2025-34143
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-287
    epss-percentile: 0.87798
    epss-score: 0.03781
  description: 'An authentication bypass vulnerability exists in ETQ Reliance on the
    CG (legacy) platform. The application allowed login as the privileged internal
    SYSTEM user by manipulating the username field. The SYSTEM account does not require
    a password, enabling attackers with network access to the login page to obtain
    elevated access. Once authenticated, an attacker could achieve remote code execution
    by modifying Jython scripts within the application. This issue was resolved by
    introducing stricter validation logic to exclude internal accounts from public
    authentication workflows in version MP-4583.

    '
  impact: 'Successful exploitation allows unauthenticated attackers to bypass authentication
    and gain elevated SYSTEM access, potentially leading to remote code execution.

    '
  metadata:
    max-request: 1
    shodan-query: html:"ETQ Reliance"
    verified: true
  name: ETQ Reliance - Authentication Bypass via Trailing Space
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2025-34143
  - https://slcyber.io/assetnote-security-research-center/how-we-accidentally-discovered-a-remote-code-execution-vulnerability-in-etq-reliance/
  remediation: 'Apply the vendor patch to version MP-4583 or later, which includes
    stricter validation logic to exclude internal accounts from public authentication
    workflows.

    '
  severity: critical
  tags: cve,cve2025,etq-reliance,auth-bypass,vkev,vuln
