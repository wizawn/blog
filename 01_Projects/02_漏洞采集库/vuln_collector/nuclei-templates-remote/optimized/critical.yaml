  - https://github.com/Cacti/cacti/blob/501712998589763d411a68d35e3cda98fd9cfd18/cmd_realtime.php#L119
  - https://github.com/Cacti/cacti/commit/53e8014d1f082034e0646edc6286cde3800c683d
