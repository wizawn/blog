    epss-percentile: 0.95903
    epss-score: 0.24038
  description: 'A vulnerability in a specific API of Cisco ISE and Cisco ISE-PIC could
    allow an unauthenticated, remote attacker to execute arbitrary code on the underlying
    operating system as root. The attacker does not require any valid credentials
    to exploit this vulnerability. This vulnerability is due to insufficient validation
    of user-supplied input. An attacker could exploit this vulnerability by submitting
    a crafted API request. A successful exploit could allow the attacker to obtain
    root privileges on an affected device.

    '
  impact: 'Unauthenticated remote attackers can execute arbitrary code as root, leading
    to full system compromise.

    '
  metadata:
    fofa-query: title="identity services engine"
    google-query: intitle:"identity services engine"
    max-request: 1
    product: identity_services_engine
    shodan-query: '"Set-Cookie: APPSESSIONID=" "Path=/admin"'
    vendor: cisco
    verified: true
