    allow an unauthenticated, remote attacker to execute arbitrary commands with root
    privileges on the underlying operating system. This vulnerability is due to improper
    input validation in the web UI. An attacker could exploit this vulnerability by
    sending crafted HTTP requests to an affected device. A successful exploit could
    allow the attacker to execute arbitrary commands with root privileges on the underlying
    operating system.

    '
