    cve-id: CVE-2021-22911
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-75,NVD-CWE-Other
    epss-percentile: 0.99715
    epss-score: 0.92332
  description: Rocket.Chat 3.11, 3.12 and 3.13 contains a NoSQL injection vulnerability
    which allows unauthenticated access to an API endpoint. An attacker can possibly
    obtain sensitive information from a database, modify data, and/or execute unauthorized
    administrative operations in the context of the affected site.
  impact: 'Successful exploitation of this vulnerability could allow an attacker to
    execute arbitrary NoSQL queries, leading to unauthorized access, data manipulation,
    or denial of service.

    '
  metadata:
    fofa-query: title="rocket.chat"
    google-query: intitle:"rocket.chat"
    max-request: 1
    product: rocket.chat
    shodan-query:
    - http.title:"Rocket.Chat"
    - http.title:"rocket.chat"
    vendor: rocket.chat
    verified: true
  name: Rocket.Chat <=3.13 - NoSQL Injection
  reference:
  - http://packetstormsecurity.com/files/162997/Rocket.Chat-3.12.1-NoSQL-Injection-Code-Execution.html
  - https://github.com/vulhub/vulhub/tree/master/rocketchat/CVE-2021-22911
  - https://hackerone.com/reports/1130721
  - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-22911
  - https://blog.sonarsource.com/nosql-injections-in-rocket-chat
  - https://nvd.nist.gov/vuln/detail/CVE-2021-22911
  remediation: 'Upgrade Rocket.Chat to a version higher than 3.13 or apply the provided
    patch to mitigate the vulnerability.

    '
  severity: critical
  tags: cve2021,cve,rocketchat,nosqli,packetstorm,vulhub,hackerone,rocket.chat,sqli,vkev,vuln
