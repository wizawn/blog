id: infoblox-netmri-rails-cookie-rce
info:
  author: iamnoooob,pdresearch
  classification:
    cwe-id: CWE-502
  description: 'Infoblox NetMRI virtual appliances before version 7.6.1 are vulnerable
    to remote code execution (RCE) due to the use of a hardcoded Ruby on Rails session
    cookie secret key. The Rails web component deserializes session cookies if the
    signing key is valid. Attackers with knowledge of this key can craft malicious
    session cookies that are deserialized by the application, leading to arbitrary
    code execution. This vulnerability is related to the known Ruby on Rails deserialization
    flaw (CVE-2013-0156). Infoblox did not assign a new CVE for this issue, as it
    is a result of the underlying Rails vulnerability.

    '
  impact: 'An attacker can exploit this vulnerability to execute arbitrary commands
    on the NetMRI server, potentially leading to complete system compromise.

    '
  metadata:
    fofa-query:
    - icon_hash="-319724102"
    - infoblox netmri
    max-request: 1
    product: netmri
    shodan-query:
    - http.title:"netmri"
    - http.favicon.hash:"-319724102"
    vendor: infoblox
    verified: true
  name: Infoblox NetMRI < 7.6.1 - Remote Code Execution via Hardcoded Ruby Cookie
    Secret Key
  reference:
  - https://rhinosecuritylabs.com/research/infoblox-multiple-cves/
  - https://nvd.nist.gov/vuln/detail/CVE-2013-0156
  remediation: 'Upgrade Infoblox NetMRI to version 7.6.1 or later to mitigate this
    vulnerability.

    '
  severity: critical
  tags: infoblox,netmri,rails,rce,deserialization,oast,vuln
