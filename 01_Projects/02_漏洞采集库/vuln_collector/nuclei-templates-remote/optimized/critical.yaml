  - https://www.rapid7.com/blog/post/2023/10/16/etr-cisco-ios-xe-web-ui-cve-2023-20198-active-exploitation/
  remediation: 'Apply Cisco security patches from advisory cisco-sa-iosxe-webui-privesc-j22SaA4z
    that validate input in the web UI and prevent command injection in the SOAP API.

