id: CVE-2024-9193
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    cve-id: CVE-2024-9193
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-98
    epss-percentile: 0.96329
    epss-score: 0.27754
  description: 'The WHMpress - WHMCS WordPress Integration Plugin plugin for WordPress
    is vulnerable to Local File Inclusion in all versions up to, and including, 6.3-revision-0
    via the whmpress_domain_search_ajax_extended_results() function. This makes it
    possible for unauthenticated attackers to include and execute arbitrary files
    on the server, allowing the execution of any PHP code in those files. This can
    be used to bypass access controls, obtain sensitive data, or achieve code execution
    in cases where images and other “safe” file types can be uploaded and included.
    This makes it possible for unauthenticated attackers to update arbitrary options
    on the WordPress site. Utilizing the /admin/services.php file, this can be leveraged
    to update the default role for registration to administrator and enable user registration
    for attackers to gain administrative user access to a vulnerable site.

    '
  impact: 'Unauthenticated attackers can leverage local file inclusion to execute
    arbitrary PHP code and manipulate WordPress options, enabling them to set the
    default registration role to administrator and gain complete site control without
    authentication.

    '
  metadata:
    max-request: 2
    verified: true
  name: WHMpress <= 6.3-revision-0 - Unauthenticated Local File Inclusion to Arbitrary
    Options Update
  reference:
  - https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/academist-membership/academist-membership-116-authentication-bypass-via-account-takeover
  - https://whmpress.com/docs/change-log/
  - https://www.wordfence.com/threat-intel/vulnerabilities/id/5f3b0e75-d2f0-48b7-ba33-75c4e998030e?source=cve
  remediation: 'Update WHMpress plugin to a version later than 6.3-revision-0 that
    addresses the local file inclusion vulnerability in the whmpress_domain_search_ajax_extended_results
    function and implements proper input validation.

    '
  severity: critical
  tags: cve,cve2024,whmpress,whmcs,wordpress,wp,intrusive,vkev,vuln
