  description: GitLab CE/EE is susceptible to information disclosure. An attacker
    can access runner registration tokens using quick actions commands, thereby making
    it possible to obtain sensitive information, modify data, and/or execute unauthorized
    operations. Affected versions are from 12.10 before 14.6.5, from 14.7 before 14.7.4,
    and from 14.8 before 14.8.2.
