  classification:
    cpe: cpe:2.3:a:cisco:identity_services_engine:*:*:*:*:*:*:*:*
    cve-id: CVE-2025-20281
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
