id: CVE-2021-24284
info:
  author: lamscun,pussycat0x,pdteam
  classification:
    cpe: cpe:2.3:a:kaswara_project:kaswara:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2021-24284
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-434
    epss-percentile: 0.98587
    epss-score: 0.68982
  description: 'WordPress Kaswara Modern VC Addons plugin through 3.0.1 is susceptible
    to an arbitrary file upload. The plugin allows unauthenticated arbitrary file
    upload via the uploadFontIcon AJAX action, which can be used to obtain code execution.
    The supplied zipfile is unzipped in the wp-content/uploads/kaswara/fonts_icon
    directory with no checks for malicious files such as PHP.

    '
  impact: 'Successful exploitation of this vulnerability can result in unauthorized
    remote code execution on the affected WordPress website.

    '
  metadata:
    framework: wordpress
    max-request: 2
    product: kaswara
    vendor: kaswara_project
  name: WordPress Kaswara Modern VC Addons <=3.0.1 - Arbitrary File Upload
  reference:
  - https://wpscan.com/vulnerability/8d66e338-a88f-4610-8d12-43e8be2da8c5
  - https://github.com/advisories/GHSA-wqvg-8q49-hjc7
  - https://www.wordfence.com/blog/2021/04/psa-remove-kaswara-modern-wpbakery-page-builder-addons-plugin-immediately/
  - https://www.waltermairena.net/en/2021/04/25/0-day-vulnerability-in-the-plugin-kaswara-modern-vc-addons-plugin-what-can-i-do/
  - https://lifeinhex.com/kaswara-exploit-or-how-much-wordfence-cares-about-user-security/
  - https://nvd.nist.gov/vuln/detail/CVE-2021-24284
  remediation: 'Update to the latest version of Kaswara Modern VC Addons plugin (>=3.0.2)
    to mitigate this vulnerability.

    '
  severity: critical
  tags: cve2021,cve,intrusive,unauth,fileupload,wpscan,wordpress,wp-plugin,rce,wp,kaswara_project,vkev,vuln
