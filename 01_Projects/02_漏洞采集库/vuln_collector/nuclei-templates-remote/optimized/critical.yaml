id: CVE-2019-12990
info:
  author: gy741
  classification:
    cpe: cpe:2.3:a:citrix:netscaler_sd-wan:*:*:*:*:*:*:*:*
    cve-id: CVE-2019-12990
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-22
    epss-percentile: 0.99655
    epss-score: 0.91507
  description: 'Citrix SD-WAN Center is susceptible to local file inclusion via the
    applianceSettingsFileTransfer function in ApplianceSettingsController. The function
    does not sufficiently validate or sanitize HTTP request parameter values used
    to construct a file system path. An attacker can trigger this vulnerability by
    routing traffic through the Collector controller and supplying a crafted value
    for filename, filedata, and workspace_id, therefore being able to write files
    to locations writable by the www-data user and/or to write a crafted PHP file
    to /home/talariuser/www/app/webroot/files/ to execute arbitrary PHP code.

    '
  impact: 'Successful exploitation of this vulnerability could lead to unauthorized
    access to sensitive information, remote code execution, or denial of service.

    '
  metadata:
    fofa-query: title="citrix sd-wan"
    google-query: intitle:"citrix sd-wan"
    max-request: 3
    product: netscaler_sd-wan
    shodan-query:
    - http.title:"Citrix SD-WAN"
    - http.title:"citrix sd-wan"
    vendor: citrix
  name: Citrix SD-WAN Center - Local File Inclusion
  reference:
  - https://www.tenable.com/security/research/tra-2019-31
  - https://support.citrix.com/search?searchQuery=*&lang=en&sort=relevance&prod=&pver=&ct=Security+Bulletin
  - https://nvd.nist.gov/vuln/detail/CVE-2019-12990
  - https://support.citrix.com/search?searchQuery=%2A&lang=en&sort=relevance&prod=&pver=&ct=Security+Bulletin
  remediation: 'Apply the latest security patches or updates provided by Citrix to
    mitigate the vulnerability.

    '
  severity: critical
  tags: cve,cve2019,citrix,rce,unauth,tenable,intrusive,vkev,vuln
