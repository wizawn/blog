id: CVE-2025-8943
info:
  author: zezezez
  classification:
    cpe: cpe:2.3:a:flowiseai:flowise:*:*:*:*:*:*:*:*
    cve-id: CVE-2025-8943
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
