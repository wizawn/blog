  classification:
    cve-id: CVE-2025-1661
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-22
    epss-percentile: 0.9965
    epss-score: 0.91448
  description: 'The HUSKY – Products Filter Professional for WooCommerce plugin for
    WordPress is vulnerable to Local File Inclusion in all versions up to, and including,
    1.3.6.5 via the ''template'' parameter of the woof_text_search AJAX action. This
    makes it possible for unauthenticated attackers to include and execute arbitrary
    files on the server, allowing the execution of any PHP code in those files. This
    can be used to bypass access controls, obtain sensitive data, or achieve code
    execution in cases where images and other “safe” file types can be uploaded and
    included.

    '
  impact: 'Unauthenticated attackers can include and execute arbitrary files through
    the template parameter, allowing arbitrary PHP code execution and potential complete
    server compromise.

    '
  metadata:
    max-request: 2
    publicwww-query: /wp-content/plugins/woocommerce-products-filter/
    verified: true
  name: HUSKY – Products Filter Professional for WooCommerce <= 1.3.6.5 - Unauthenticated
    Local File Inclusion
  reference:
  - https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/woocommerce-products-filter/husky-products-filter-professional-for-woocommerce-1365-unauthenticated-local-file-inclusion
  - https://plugins.trac.wordpress.org/browser/woocommerce-products-filter/trunk/ext/by_text/index.php
  - https://plugins.trac.wordpress.org/changeset?sfp_email=&sfph_mail=&reponame=&old=3249621%40woocommerce-products-filter&new=3249621%40woocommerce-products-filter&sfp_email=&sfph_mail=
  - https://plugins.trac.wordpress.org/changeset?sfp_email=&sfph_mail=&reponame=&old=3253169%40woocommerce-products-filter&new=3253169%40woocommerce-products-filter&sfp_email=&sfph_mail=
  - https://www.wordfence.com/threat-intel/vulnerabilities/id/9ae7b6fc-2120-4573-8b1b-d5422d435fa5?source=cve
  remediation: 'Update to version 1.3.6.6, or a newer patched version

    '
  severity: critical
  tags: cve,cve2025,woocommerce-products-filter,wordpress,wp-plugin,wp,woocommerce,vkev,vuln
