id: CVE-2024-4885
info:
  author: SinSinology,iamnoooob,rootxharsh,pdresearch
  classification:
    cpe: cpe:2.3:a:progress:whatsup_gold:*:*:*:*:*:*:*:*
    cve-id: CVE-2024-4885
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-22
    epss-percentile: 0.9993
    epss-score: 0.9426
  description: 'This vulnerability allows remote attackers to execute arbitrary code
    on affected installations of Progress Software WhatsUp Gold. Authentication is
    not required to exploit this vulnerability.

    The specific flaw exists within the implementation of GetFileWithoutZip method.
    The issue results from the lack of proper validation of a user-supplied path prior
    to using it in file operations. An attacker can leverage this vulnerability to
    execute code in the context of the service account.

    '
  impact: 'Unauthenticated attackers can exploit directory traversal to read sensitive
    files and achieve remote code execution.

    '
  metadata:
    max-request: 1
    product: whatsup_gold
    shodan-query: html:"WhatsUp Gold"
    vendor: progress
    verified: true
  name: Progress Software WhatsUp Gold GetFileWithoutZip Directory Traversal - Remote
    Code Execution
  reference:
  - https://community.progress.com/s/article/WhatsUp-Gold-Security-Bulletin-June-2024
  - https://www.zerodayinitiative.com/advisories/ZDI-24-893/
  - https://summoning.team/blog/progress-whatsup-gold-rce-cve-2024-4885/
  - https://www.progress.com/network-monitoring
  - https://github.com/sinsinology/CVE-2024-4885
  remediation: 'Update Progress WhatsUp Gold to a version that patches CVE-2024-4885.

    '
  severity: critical
  tags: cve,cve2024,rce,progress,whatsup,lfi,kev,vkev,vuln
