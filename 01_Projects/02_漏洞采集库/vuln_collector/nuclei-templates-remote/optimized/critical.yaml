id: CVE-2025-3605
info:
  author: beginee
  classification:
    cpe: cpe:2.3:a:wordpress:frontend_login_and_registration_blocks:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2025-3605
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-639
    epss-percentile: 0.94613
    epss-score: 0.1606
  description: 'Privilege escalation vulnerability exists in the Frontend Login and
    Registration Blocks plugin for WordPress (versions <= 1.0.7). An unauthenticated
    attacker can exploit the AJAX endpoint flr_blocks_user_settings_handle_ajax_callback()
    to change the administrator''s email address. Subsequently, the attacker can use
    the "Forgot Password" feature to reset the administrator''s password, thereby
    gaining unauthorized access to the admin account.

    '
  impact: 'Unauthenticated attackers can change administrator email addresses through
    the AJAX endpoint, enabling password reset attacks and complete admin account
    takeover.

    '
  metadata:
    fofa-query: body="/wp-content/plugins/frontend-login-and-registration-blocks/"
    max-request: 1
    publicwww-query: /wp-content/plugins/frontend-login-and-registration-blocks/
    verified: true
  name: WordPress Frontend Login and Registration Blocks Plugin 1.0.7 - Privilege
    Escalation
  reference:
  - https://wordpress.org/plugins/frontend-login-and-registration-blocks/
  - https://github.com/GadaLuBau1337/CVE-2025-3605/tree/main
  - https://nvd.nist.gov/vuln/detail/CVE-2025-3605
  - https://plugins.trac.wordpress.org/browser/frontend-login-and-registration-blocks/trunk/inc/class-flr-blocks-user-settings.php#L59
  - https://www.wordfence.com/threat-intel/vulnerabilities/id/0c11668c-6dc3-4539-b2be-bf6528bed73e?source=cve
  remediation: 'Upgrade WordPress Frontend Login and Registration Blocks plugin to
    version 1.0.8 or later that properly restricts user settings updates.

    '
  severity: critical
  tags: cve,cve2025,wp,wp-plugin,wordpress,frontend-login-and-registration-blocks,intrusive,vkev,vuln
variables:
  email: '{{rand_base(7)}}@{{rand_base(5)}}.com'
  userid: '1'
---
