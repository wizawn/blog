  matchers-condition: and
  raw:
  - "POST /3.0/authService/config HTTP/1.1\nHost: {{Hostname}}\nCmd: id\nContent-Type:\
    \ application/json;charset=utf-8\nOrigin: {{RootURL}}\nReferer: {{RootURL}}\n\
