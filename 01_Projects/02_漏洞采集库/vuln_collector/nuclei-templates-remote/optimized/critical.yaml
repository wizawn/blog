    max-request: 2
  name: Hikvision iVMS-8700 - File Upload Remote Code Execution
  reference:
  - https://www.wangan.com/p/11v754aceadb994f
  - https://cn-sec.com/archives/1828326.html
  severity: critical
  tags: hikvision,ivms,fileupload,rce,intrusive,vuln
variables:
