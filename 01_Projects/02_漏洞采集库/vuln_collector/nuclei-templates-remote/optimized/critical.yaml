id: CVE-2025-34152
info:
  author: Chocapikk,DhiyaneshDk
  description: 'An unauthenticated OS command injection vulnerability exists in the
    Shenzhen Aitemi M300 Wi-Fi Repeater (hardware model MT02) via the ''time'' parameter
    of the ''/protocol.csp?'' endpoint. The input is processed by the internal date
    ''-s'' command without rebooting or disrupting HTTP service. Unlike other injection
    points, this vector allows remote compromise without triggering visible configuration
    changes.

    '
  impact: 'Unauthenticated attackers can execute arbitrary operating system commands
    through the time parameter in the protocol.csp endpoint without disrupting device
    operation.

    '
  metadata:
    fofa-query: icon_hash="-741058468" && server=="lighttpd/1.4.32"
    max-request: 1
    shodan-query: http.favicon.hash:-741058468 "lighttpd/1.4.32"
    verified: true
  name: Shenzhen Aitemi M300 Wi-Fi Repeater – Unauthenticated Remote Command Execution
    via `time` Parameter
  reference:
  - https://chocapikk.com/posts/2025/when-a-wifi-name-gives-you-root-part-two/
  - https://github.com/rapid7/metasploit-framework/pull/20455/files
  - https://nvd.nist.gov/vuln/detail/CVE-2025-34152
  remediation: 'Update Shenzhen Aitemi M300 Wi-Fi Repeater firmware to the latest
    version that properly sanitizes the time parameter.

    '
  severity: critical
  tags: cve,cve2025,aitemi,m300,wifi,unauth,rce,vkev,vuln
