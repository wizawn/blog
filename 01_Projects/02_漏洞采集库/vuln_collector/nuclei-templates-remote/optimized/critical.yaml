id: CVE-2025-34040
info:
  author: iamnoooob,pdresearch
  classification:
    epss-percentile: 0.90953
    epss-score: 0.06587
  description: 'An arbitrary file upload vulnerability exists in the Zhiyuan OA platform
    5.0, 5.1 - 5.6sp1, 6.0 - 6.1sp2, 7.0, 7.0sp1 - 7.1, 7.1sp1, and 8.0 - 8.0sp2 via
    the wpsAssistServlet interface. The realFileType and fileId parameters are improperly
    validated during multipart file uploads, allowing unauthenticated attackers to
    upload crafted JSP files outside of intended directories using path traversal.
    Successful exploitation enables remote code execution as the uploaded file can
    be accessed and executed through the web server.

    '
  impact: 'Unauthenticated attackers can upload malicious JSP files through path traversal
    in the wpsAssistServlet interface, achieving remote code execution on the Zhiyuan
    OA server.

    '
  metadata:
    fofa-query: body="seeyon/index.jsp"
    max-request: 1
    verified: true
  name: Zhiyuan OA Platform - Arbitrary File Upload
  reference:
  - https://www.cve.org/CVERecord?id=CVE-2025-34040
  - https://www.cnblogs.com/pursue-security/p/17677130.html
  remediation: 'Upgrade to Zhiyuan OA platform version 8.0sp3 or later that properly
    validates file upload paths and file types.

    '
  severity: critical
  tags: cve,cve2025,file-upload,intrusive,zhiyuan,lfi,vkev,vuln
