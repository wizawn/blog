id: cerio-dt-rce
info:
  author: pussycat0x
  description: 'CERIO DT series routers have an operation command injection vulnerability
    in specific versions. An attacker could exploit this vulnerability to execute
    commands.

    '
  metadata:
    fofa-query: title="DT-100G-N" || title="DT-300N" || title="DT-100G" || title="AMR-3204G"
      || title="WMR-200N"
    max-request: 1
    verified: true
  name: CERIO-DT Interface - Command Execution
  reference:
  - https://github.com/20142995/sectool
  - https://github.com/tanjiti/sec_profile
  - https://github.com/wy876/POC/blob/main/D-Link_DAR-8000%E6%93%8D%E4%BD%9C%E7%B3%BB%E7%BB%9F%E5%91%BD%E4%BB%A4%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E(CVE-2023-4542).md
