id: CVE-2023-39796
info:
  author: youngpope
  classification:
    cpe: cpe:2.3:a:wbce:wbce_cms:1.6.0:*:*:*:*:*:*:*
    cve-id: CVE-2023-39796
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-89
    epss-percentile: 0.98938
    epss-score: 0.77185
  description: 'There is an sql injection vulnerability in "miniform module" which
    is a default module installed in the WBCE cms. It is an unauthenticated sqli so
    anyone could access it and takeover the whole database. In file "/modules/miniform/ajax_delete_message.php"
    there is no authentication check. On line 40 in this file, there is a DELETE query
    that is vulnerable, an attacker could jump from the query using the tick sign
    - `.

    '
  impact: 'Unauthenticated attackers can execute time-based SQL injection through
    the DB_RECORD_TABLE parameter in the miniform module to extract the complete CMS
    database and takeover the WBCE installation.

    '
  metadata:
    max-request: 1
    product: wbce_cms
    vendor: wbce
    verified: true
  name: WBCE 1.6.0 - SQL Injection
  reference:
  - https://forum.wbce.org/viewtopic.php?pid=42046#p42046
  - https://github.com/WBCE/WBCE_CMS/releases/tag/1.6.1
  - https://pastebin.com/PBw5AvGp
  remediation: Fixed in version 1.6.1
  severity: critical
  tags: time-based-sqli,cve,cve2023,sqli,wbce,intrusive,vkev,vuln
---
