    epss-percentile: 0.99679
    epss-score: 0.91869
  description: 'Laminas Project laminas-http < 2.14.2 and Zend Framework 3.0.0 contain
    a deserialization vulnerability caused by __destruct method in Zend\\Http\\Response\\Stream,
    letting attackers control content lead to remote code execution, exploit requires
    attacker-controlled serialized data.

    '
  impact: 'Attackers can execute arbitrary code remotely by controlling serialized
    content during deserialization.

    '
  metadata:
    max-request: 2
    product: laminas-http
    shodan-query: http.html:"laminas"
    vendor: getlaminas
    verified: true
  name: Laminas Project laminas-http - Remote Code Execution
  reference:
  - https://github.com/Ling-Yizhou/zendframework3-/blob/main/zend%20framework3%20%E5%8F%8D%E5%BA%8F%E5%88%97%E5%8C%96%20rce.md
  - https://research.checkpoint.com/2021/freakout-leveraging-newest-vulnerabilities-for-creating-a-botnet/
  remediation: 'Update to laminas-http 2.14.2 or later; note that Zend Framework is
    no longer supported.

    '
  severity: critical
  tags: cve,cve2021,laminas,zend,rce,deserialization,vkev
