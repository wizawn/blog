  description: 'Deserialization of untrusted data in on-premises Microsoft SharePoint
    Server allows an unauthorized attacker to execute code over a network. This vulnerability
    is part of the ToolShell exploit chain and when combined with CVE-2025-53771 (authentication
    bypass), enables unauthenticated remote code execution. Microsoft is aware that
    an exploit for CVE-2025-53770 exists in the wild. Microsoft is preparing and fully
    testing a comprehensive update to address this vulnerability. In the meantime,
    please make sure that the mitigation provided in this CVE documentation is in
    place so that you are protected from exploitation.

    '
  impact: 'Unauthenticated attackers can exploit unsafe deserialization to achieve
    remote code execution on SharePoint Server, leading to full system compromise.

    '
