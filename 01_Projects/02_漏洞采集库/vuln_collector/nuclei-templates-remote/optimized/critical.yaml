    - (?i)(22\.7[Rr][0-1](?:\.[0-1])?)
    - (?i)(22\.7[Rr]2(?:\.[0-4])?)
    type: regex
  - kval:
    - version
    type: kval
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Ivanti
    - Connect Secure
    - Policy Secure
    - Neurons for ZTA
  - dsl:
    - compare_versions(vulnerable_version, '< 22.7R2.5')
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/dana-na/auth/url_default/welcome.cgi'
  - '{{BaseURL}}/dana-na/auth/url_6/welcome.cgi'
  - '{{BaseURL}}/dana/home/index.cgi'
  stop-at-first-match: true
