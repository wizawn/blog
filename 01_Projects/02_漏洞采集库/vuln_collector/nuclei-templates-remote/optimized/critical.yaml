    → RCE) vulnerability affecting DELMIA Apriso (Release 2020 → Release 2025). When
    an authenticated user can upload files and the upload handler fails to canonicalize
    filenames or enforce storage restrictions, an attacker may place executable artifacts
    into web-served locations (via path traversal or insufficient normalization) and
    achieve remote code execution under the webserver context.

    '
