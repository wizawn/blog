    remote code execution vulnerability via arbitrary file write. An authenticated
    user can exploit the Git node to overwrite critical files and execute untrusted
    code on the n8n server, potentially leading to full system compromise. The vulnerability
    affects both self-hosted and n8n Cloud instances.

    '
  impact: 'Full system compromise including access to all credentials, API tokens,
    OAuth secrets, database connections, and workflow automation capabilities. n8n
    becomes a single point of failure exposing all connected systems.

    '
