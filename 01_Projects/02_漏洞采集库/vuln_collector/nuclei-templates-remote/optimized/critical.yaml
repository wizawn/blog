id: CVE-2025-2010
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    cve-id: CVE-2025-2010
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-89
    epss-percentile: 0.9575
    epss-score: 0.22833
  description: 'The JobWP - Job Board, Job Listing, Career Page and Recruitment Plugin
    plugin for WordPress is vulnerable to SQL Injection via the ''jobwp_upload_resume''
    parameter in all versions up to, and including, 2.3.9 due to insufficient escaping
    on the user supplied parameter and lack of sufficient preparation on the existing
    SQL query. This makes it possible for unauthenticated attackers to append additional
    SQL queries into already existing queries that can be used to extract sensitive
    information from the database.

    '
  impact: 'Successful exploitation could allow an attacker to execute arbitrary SQL
    queries, potentially leading to data exfiltration, privilege escalation, or other
    malicious activities.

    '
  metadata:
    fofa-query: body="/wp-content/plugins/jobwp"
    max-request: 1
    product: jobwp
    verified: true
  name: WordPress JobWP Plugin <= 2.3.9 - SQL Injection
  reference:
  - https://wpscan.com/vulnerability/26713902-26d8-47e3-b651-fe30d9898270/
  - https://nvd.nist.gov/vuln/detail/CVE-2025-2010
  remediation: 'Update the JobWP Plugin to version later than 2.3.9. Alternatively,
    implement proper input validation and sanitization controls.

    '
  severity: critical
  tags: cve,cve2025,wp,wordpress,wp-plugin,sqli,jobwp,vuln
