    type: regex
  raw:
  - 'GET /open.php HTTP/1.1

    Host: {{Hostname}}

    '
- extractors:
  - group: 1
    internal: true
    name: formid
    part: body
    regex:
    - <label for=\\"([^"]+)\\">
    type: regex
  - group: 1
    internal: true
    name: ticketid
    part: header
    regex:
