  - http://wiki.peiqi.tech/wiki/oa/万户OA/万户OA%20OfficeServer.jsp%20任意文件上传漏洞.html
  severity: critical
  tags: wanhu,oa,officeserver,fileupload,intrusive,vuln
---
http:
- matchers:
  - condition: and
    type: word
    words:
    - 请选择要上传的文件
    - <TITLE>上传附件</TITLE>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/defaultroot/extension/smartUpload.jsp?path=information&fileName=infoPicName&saveName=infoPicSaveName&tableName=infoPicTable&fileMaxSize=0&fileMaxNum=0&fileType=gif,jpg,bmp,jsp,png&fileMinWidth=0&fileMinHeight=0&fileMaxWidth=0&fileMaxHeight=0'
id: wanhuoa-smartupload-file-upload
info:
  author: SleepingBag945
  description: 'Wanhu OA smartUpload.jsp file has a file upload interface and does
    not filter file types, resulting in arbitrary file upload vulnerabilities. Malicious
    JSP files can be uploaded directly.

    '
  metadata:
    fofa-query: app="万户网络-ezOFFICE"
    max-request: 1
    verified: true
  name: Wanhu OA smartUpload.jsp - Arbitrary File Upload
  reference:
  - https://github.com/PeiQi0/PeiQi-WIKI-Book/blob/90103c248a2c52bb0a060d0ee95d5a67e4579c3d/docs/wiki/oa/%E4%B8%87%E6%88%B7OA/%E4%B8%87%E6%88%B7OA%20smartUpload.jsp%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md?plain=1#L24
  severity: critical
  tags: wanhu,oa,smartupload,file-upload,vuln
---
http:
- extractors:
  - group: 1
    internal: true
    name: filename
    regex:
    - '"data":"(.*?)"'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code_1 == 200 && contains(body_1, "\"result\":\"success\"") && contains(body_1,"fileSize")
    - status_code_2 == 200 && contains(body_2,"{{result}}")
    type: dsl
  raw:
