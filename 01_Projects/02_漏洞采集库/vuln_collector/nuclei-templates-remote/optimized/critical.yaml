    on the affected system through deserialization of malicious JSON payloads.

    '
  metadata:
    max-request: 1
    product: jackson-databind
    vendor: fasterxml
    verified: true
  name: FasterXML jackson-databind - Deserialization Remote Code Execution
  reference:
