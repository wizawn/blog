    Access-Control-Request-Headers: content-type

    '
id: CVE-2025-34291
info:
  author: 686f6c61
  classification:
    cve-id: CVE-2025-34291
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
    cvss-score: 9.4
    cwe-id: CWE-942
    epss-percentile: 0.94171
    epss-score: 0.14036
  description: 'Langflow AI versions 1.6.9 and earlier are vulnerable to a CORS misconfiguration
    that allows any origin to make credentialed requests. Combined with SameSite=None
    cookies, this enables cross-origin token theft and subsequent remote code execution
    via the /api/v1/validate/code endpoint.

    '
  impact: 'An attacker can steal authentication tokens via CORS and execute arbitrary
    code on the server.

    '
  metadata:
    fofa-query: body="Langflow"
    max-request: 2
    product: langflow
    shodan-query: html:"Langflow"
    vendor: langflow-ai
    verified: true
  name: Langflow AI <= 1.6.9 - CORS Misconfiguration
  reference:
  - https://www.obsidiansecurity.com/blog/cve-2025-34291-critical-account-takeover-and-rce-vulnerability-in-the-langflow-ai-agent-workflow-platform
  - https://nvd.nist.gov/vuln/detail/CVE-2025-34291
  - https://github.com/langflow-ai/langflow
  remediation: 'Upgrade to Langflow version 1.7.0 or later which restricts CORS origins
    properly.

    '
  severity: critical
  tags: cve,cve2025,langflow,cors,misconfig,vuln,oss,vkev
