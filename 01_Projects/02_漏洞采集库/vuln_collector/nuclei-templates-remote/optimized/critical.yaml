id: CVE-2024-28253
info:
  author: daffainfo
  classification:
    cpe: cpe:2.3:a:open-metadata:openmetadata:*:*:*:*:*:*:*:*
    cve-id: CVE-2024-28253
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:L
    cvss-score: 9.4
    cwe-id: CWE-94
    epss-percentile: 0.99732
    epss-score: 0.9256
  description: 'OpenMetadata is a unified platform for discovery, observability, and
    governance powered by a central metadata repository, in-depth lineage, and seamless
    team collaboration. `CompiledRule::validateExpression` is also called from `PolicyRepository.prepare`.
    `prepare()` is called from `EntityRepository.prepareInternal()` which, in turn,
    gets called from `EntityResource.createOrUpdate()`. Note that even though there
    is an authorization check (`authorizer.authorize()`), it gets called after `prepareInternal()`
    gets called and therefore after the SpEL expression has been evaluated. In order
    to reach this method, an attacker can send a PUT request to `/api/v1/policies`
    which gets handled by `PolicyResource.createOrUpdate()`. This vulnerability was
    discovered with the help of CodeQL''s Expression language injection (Spring) query
    and is also tracked as `GHSL-2023-252`. This issue may lead to Remote Code Execution
    and has been addressed in version 1.3.1. Users are advised to upgrade. There are
    no known workarounds for this vulnerability.

    '
  impact: 'Attackers can execute arbitrary code remotely, potentially leading to full
    system compromise.

    '
  metadata:
    fofa-query: icon_hash="733091897"
    google-query: intitle:"openmetadata"
    max-request: 3
    product: openmetadata
    shodan-query: http.favicon.hash:"733091897"
    vendor: open-metadata
  name: OpenMetaData - SpEL Injection in PUT /api/v1/policies
  reference:
  - https://securitylab.github.com/advisories/GHSL-2023-235_GHSL-2023-237_Open_Metadata/
  - https://github.com/open-metadata/OpenMetadata/security/advisories/GHSA-7vf4-x5m2-r6gr
  - https://nvd.nist.gov/vuln/detail/VE-2024-28253
  - https://codeql.github.com/codeql-query-help/java/java-spel-expression-injection
  - https://github.com/open-metadata/OpenMetadata/blob/b6b337e09a05101506a5faba4b45d370cc3c9fc8/openmetadata-service/src/main/java/org/openmetadata/service/jdbi3/EntityRepository.java#L693
  remediation: 'Upgrade to version 1.3.1 or later.

    '
  severity: critical
  tags: cve,cve2024,openmetadata,spel,rce,intrusive,file-upload,oast,vkev
