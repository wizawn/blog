    affecting Citrix ADC (NetScaler ADC) and Citrix Gateway appliances configured
    as a Gateway (VPN virtual server, ICA Proxy, CVPN, RDP Proxy) or AAA virtual server.
    Exploitation can lead to arbitrary code execution.

