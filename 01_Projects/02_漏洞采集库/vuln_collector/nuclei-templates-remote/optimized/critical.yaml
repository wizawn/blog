  - https://patchstack.com/database/wordpress/plugin/real-estate-listing-realtyna-wpl/vulnerabilities
  remediation: 'Update to the latest version of the plugin, version 4.14.5 or later.

    '
  severity: critical
  tags: cve,cve2024,wordpress,wp-plugin,sqli,realtyna,wp,unauth,real-estate-listing-realtyna-wpl,info-leak,vuln
