  description: 'In Progress MOVEit Transfer before 2021.0.8 (13.0.8), 2021.1.6 (13.1.6),
    2022.0.6 (14.0.6), 2022.1.7 (14.1.7), and 2023.0.3 (15.0.3), a SQL injection vulnerability
    has been identified in the MOVEit Transfer web application that could allow an
    unauthenticated attacker to gain unauthorized access to MOVEit Transfer''s database.
