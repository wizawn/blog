  - https://nvd.nist.gov/vuln/detail/CVE-2025-5701
  remediation: 'Upgrade HyperComments plugin to a version later than 1.2.2 that implements
    proper capability checks on the hc_request_handler function.

    '
  severity: critical
  tags: cve,cve2025,wp,wp-plugin,wordpress,hypercomments,priv-esc,vuln
