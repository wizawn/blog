id: CVE-2019-11580
info:
  author: dwisiswant0
  classification:
    cpe: cpe:2.3:a:atlassian:crowd:*:*:*:*:*:*:*:*
    cve-id: CVE-2019-11580
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    epss-percentile: 0.99969
    epss-score: 0.94386
  description: Atlassian Crowd and Crowd Data Center is susceptible to a remote code
    execution vulnerability because the pdkinstall development plugin is incorrectly
    enabled in release builds.    Attackers who can send unauthenticated or authenticated
    requests to a Crowd or Crowd Data Center instance can exploit this vulnerability
    to install arbitrary plugins, which permits remote code execution on systems running
    a vulnerable version of Crowd or Crowd Data Center. All versions of Crowd from
    version 2.1.0 before 3.0.5 (the fixed version for 3.0.x), from version 3.1.0 before
    3.1.6 (the fixed version for 3.1.x),from version 3.2.0 before 3.2.8 (the fixed
    version for 3.2.x), from version 3.3.0 before 3.3.5 (the fixed version for 3.3.x),
    and from version 3.4.0 before 3.4.4 (the fixed version for 3.4.x) are affected
    by this vulnerability.
  impact: 'Successful exploitation of this vulnerability allows remote attackers to
    execute arbitrary code on the affected system, leading to complete compromise
    of the system.

    '
  metadata:
    max-request: 2
    product: crowd
    shodan-query:
    - http.component:"Atlassian Jira"
    - http.component:"atlassian jira"
    vendor: atlassian
  name: Atlassian Crowd and Crowd Data Center - Unauthenticated Remote Code Execution
  reference:
  - https://github.com/jas502n/CVE-2019-11580
  - https://jira.atlassian.com/browse/CWD-5388
  - https://nvd.nist.gov/vuln/detail/CVE-2019-11580
  - http://packetstormsecurity.com/files/163810/Atlassian-Crowd-pdkinstall-Remote-Code-Execution.html
  - https://github.com/Elsfa7-110/kenzer-templates
  remediation: 'Upgrade to Atlassian Crowd and Crowd Data Center version 3.4.3 or
    later to mitigate this vulnerability.

    '
  severity: critical
  tags: cve,cve2019,packetstorm,kev,atlassian,rce,intrusive,unauth,vkev,vuln
