id: CVE-2022-0952
info:
  author: random-robbie
  classification:
    cpe: cpe:2.3:a:sitemap_project:sitemap:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2022-0952
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:H/I:H/A:H
    cvss-score: 8.8
    cwe-id: CWE-352
    epss-percentile: 0.99524
    epss-score: 0.89187
  description: 'WordPress Sitemap by click5 plugin before 1.0.36 is susceptible to
    missing authorization. The plugin does not have authorization or CSRF checks when
    updating options via a REST endpoint and does not ensure that the option to be
    updated belongs to the plugin. An attacker can possibly obtain sensitive information,
    modify data, and/or execute unauthorized administrative operations in the context
    of the affected site.

    '
  impact: 'An attacker can exploit this vulnerability to gain unauthorized access
    to sensitive information.

    '
  metadata:
    framework: wordpress
    max-request: 3
    product: sitemap
    vendor: sitemap_project
    verified: true
  name: WordPress Sitemap by click5 <1.0.36 - Missing Authorization
  reference:
  - https://wpscan.com/vulnerability/0f694961-afab-44f9-846c-e80a0f6c768b
  - https://nvd.nist.gov/vuln/detail/CVE-2022-0952
  - https://github.com/ARPSyndicate/kenzer-templates
  - https://github.com/RandomRobbieBF/CVE-2022-0952
  - https://github.com/nomi-sec/PoC-in-GitHub
  remediation: 'Update to the latest version of the WordPress Sitemap plugin by click5
    (1.0.36 or higher) to fix the missing authorization issue.

    '
  severity: high
  tags: cve,cve2022,wp,wp-plugin,sitemap,wpscan,wordpress,sitemap_project,vkev,vuln
