  classification:
    cpe: cpe:2.3:a:shokoanime:shokoserver:*:*:*:*:*:*:*:*
    cve-id: CVE-2023-43662
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:N/A:N
    cvss-score: 8.6
    cwe-id: CWE-22
    epss-percentile: 0.99662
    epss-score: 0.916
  description: 'ShokoServer is a media server which specializes in organizing anime.
    In affected versions the `/api/Image/WithPath` endpoint is accessible without
    authentication and is supposed to return default server images. The endpoint accepts
    the parameter `serverImagePath`, which is not sanitized in any way before being
    passed to `System.IO.File.OpenRead`, which results in an arbitrary file read.

    '
  impact: 'This issue may lead to an arbitrary file read which is exacerbated in the
    windows installer which installs the ShokoServer as administrator. Any unauthenticated
    attacker may be able to access sensitive information and read files stored on
    the server.

    '
  metadata:
    fofa-query: title="Shoko WEB UI"
    product: shokoserver
    vendor: shokoanime
    verified: true
  name: ShokoServer System - Local File Inclusion (LFI)
