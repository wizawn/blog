  description: 'Joplin is a free, open source note taking and to-do application, which
    can handle a large number of notes organised into notebooks. Prior to version
    3.3.3, a privilege escalation vulnerability exists in the Joplin server, allowing
    non-admin users to exploit the API endpoint `PATCH /api/users/-id` to set the
    `is_admin` field to 1. The vulnerability allows malicious low-privileged users
    to perform administrative actions without proper authorization. This issue has
    been patched in version 3.3.3.

    '
  impact: 'Authenticated low-privileged users can escalate their privileges to administrator
    by setting the is_admin field through the PATCH /api/users endpoint, gaining complete
    control over the Joplin server.

    '
  metadata:
    framework: '-'
    product: joplin
    shodan-query: title:"Joplin Server"
    vendor: joplin_project
    verified: true
  name: Joplin 3.3.3 Server - Privilege Escalation
  reference:
  - https://github.com/laurent22/joplin/security/advisories/GHSA-xj67-649m-3p8x
  - https://nvd.nist.gov/vuln/detail/CVE-2025-27134
  remediation: 'Upgrade to Joplin version 3.3.3 or later that properly restricts the
    is_admin field modification.

    '
  severity: high
  tags: cve,cve2025,auth,joplin,oss,default-login,vuln
