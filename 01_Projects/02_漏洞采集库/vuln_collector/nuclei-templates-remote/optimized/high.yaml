id: CVE-2025-6851
info:
  author: iamnoooob,pdresearch
  classification:
    cpe: cpe:2.3:a:broken_link_notifier_project:broken_link_notifier:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2025-6851
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-918
    epss-percentile: 0.82418
    epss-score: 0.01794
  description: 'The Broken Link Notifier plugin for WordPress is vulnerable to Server-Side
    Request Forgery in all versions up to, and including, 1.3.0 via the ajax_blinks()
    function which ultimately calls the check_url_status_code() function. This makes
    it possible for unauthenticated attackers to make web requests to arbitrary locations
    originating from the web application and can be used to query and modify information
    from internal services.

    '
  impact: 'An attacker can exploit this vulnerability to perform server-side request
    forgery attacks, potentially accessing internal services, reading local files,
    or conducting port scanning from the server''s perspective.

    '
  metadata:
    fofa-query: body="blnotifier_front_end"
    max-request: 2
    product: broken_link_notifier
    publicwww-query: /wp-content/plugins/broken-link-notifier/
    vendor: broken_link_notifier_project
    verified: true
  name: WordPress Broken Link Notifier < 1.3.1 - Unauthenticated SSRF
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2025-6851
  - https://wpscan.com/vulnerability/CVE-2025-6851
  - https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/broken-link-notifier/broken-link-notifier-130-unauthenticated-server-side-request-forgery
  remediation: 'Update the Broken Link Notifier plugin to version 1.3.1 or later which
    fixes this vulnerability. If immediate update is not possible, consider temporarily
    disabling the plugin until the fix can be applied.

    '
  severity: high
  tags: cve,cve2025,wp-plugin,wordpress,ssrf,oast,unauth,wpscan,broken-link-notifier,vkev,vuln
