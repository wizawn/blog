id: CVE-2025-27888
info:
  author: xbow,DhiyaneshDK
  classification:
    epss-percentile: 0.80434
    epss-score: 0.01448
  description: 'Server-Side Request Forgery (SSRF), Improper Neutralization of Input
    During Web Page Generation (''Cross-site Scripting''), URL Redirection to Untrusted
    Site (''Open Redirect'') vulnerability in Apache Druid.This issue affects all
    previous Druid versions.When using the Druid management proxy, a request that
    has a specially crafted URL could be used to redirect the request to an arbitrary
    server instead. This has the potential for XSS or XSRF. The user is required to
    be authenticated for this exploit. The management proxy is enabled in Druid''s
    out-of-box configuration. It may be disabled to mitigate this vulnerability. If
    the management proxy is disabled, some web console features will not work properly,
    but core functionality is unaffected.Users are recommended to upgrade to Druid
    31.0.2 or Druid 32.0.1, which fixes the issue.

    '
  impact: 'Authenticated attackers can exploit SSRF vulnerabilities through the management
    proxy to redirect requests to arbitrary servers, potentially enabling XSS, XSRF
    attacks, or accessing internal services.

    '
  metadata:
    fofa-query: title="apache druid"
    google-query: intitle:"apache druid"
    max-request: 1
    product: druid
    shodan-query: http.title:"apache druid"
    vendor: apache
    verified: true
  name: Apache Druid - Server-Side Request Forgery
  reference:
  - https://lists.apache.org/thread/c0qo989pwtrqkjv6xfr0c30dnjq8vf39
  - http://www.openwall.com/lists/oss-security/2025/03/19/7
  remediation: 'Upgrade to Apache Druid version 31.0.2 or 32.0.1, or disable the management
    proxy to mitigate this vulnerability.

    '
  severity: high
  tags: cve,cve2025,apache,druid,ssrf,oast,oss,vuln
