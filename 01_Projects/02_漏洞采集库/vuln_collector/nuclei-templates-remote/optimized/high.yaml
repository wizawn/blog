info:
  author: s4e-io
  classification:
    cve-id: CVE-2024-8484
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-89
    epss-percentile: 0.99504
    epss-score: 0.88865
  description: 'The REST API TO MiniProgram plugin for WordPress is vulnerable to
    SQL Injection via the ''order'' parameter of the /wp-json/watch-life-net/v1/comment/getcomments
    REST API endpoint in all versions up to, and including, 4.7.1 due to insufficient
    escaping on the user supplied parameter and lack of sufficient preparation on
    the existing SQL query. This makes it possible for unauthenticated attackers to
    append additional SQL queries into already existing queries that can be used to
    extract sensitive information from the database.

    '
  impact: 'Unauthenticated attackers can exploit time-based SQL injection through
    the order parameter to extract sensitive database information, including user
    credentials, comments, and personal data from the WordPress database.

    '
  metadata:
    framework: wordpress
    max-request: 2
    product: rest-api-to-miniprogram
    publicwww-query: /wp-content/plugins/rest-api-to-miniprogram
    vendor: jianbo
    verified: true
  name: REST API TO MiniProgram <= 4.7.1 - SQL Injection
  reference:
  - https://github.com/RandomRobbieBF/CVE-2024-8484
  - https://www.usom.gov.tr/bildirim/tr-24-1528
  - https://plugins.trac.wordpress.org/browser/rest-api-to-miniprogram/tags/4.7.0/includes/api/ram-rest-comments-controller.php#L247
  - https://www.wordfence.com/threat-intel/vulnerabilities/id/6e0945eb-ceec-4536-822a-fe864c21b580?source=cve
  - https://nvd.nist.gov/vuln/detail/CVE-2024-8484
  remediation: 'Update REST API TO MiniProgram plugin to a version later than 4.7.1
    to address the SQL injection vulnerability in the order parameter of the getcomments
    REST API endpoint.

    '
  severity: high
  tags: time-based-sqli,cve,cve2024,wp,wp-plugin,wordpress,sqli,miniprogram,vuln
