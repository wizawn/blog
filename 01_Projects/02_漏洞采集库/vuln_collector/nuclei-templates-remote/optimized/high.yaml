id: cpas-managment-sqli
info:
  author: s4e-io
  description: 'The CPAS Audit Management System V4 has been identified with an SQL
    injection vulnerability in the getCurserIfAllowLogin endpoint. This flaw allows
    unauthenticated remote attackers to exploit the system by injecting malicious
    SQL queries. Through this vulnerability, attackers can retrieve sensitive data
    from the database and, under high-privilege circumstances, upload malicious payloads
    such as web shells to the server. This could potentially lead to a full compromise
    of the server''s system. The vulnerability is triggered via a crafted HTTP POST
    request containing a malicious ygbh parameter, making it a critical issue that
    requires immediate remediation to protect the integrity of the system.

