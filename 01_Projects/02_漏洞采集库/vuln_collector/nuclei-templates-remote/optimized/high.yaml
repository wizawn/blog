id: CVE-2019-17558
info:
  author: pikpikcu,madrobot
  classification:
    cpe: cpe:2.3:a:apache:solr:*:*:*:*:*:*:*:*
    cve-id: CVE-2019-17558
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 7.5
    cwe-id: CWE-74
    epss-percentile: 0.99998
    epss-score: 0.94474
  description: Apache Solr versions 5.0.0 to 8.3.1 are vulnerable to remote code execution
    vulnerabilities through the VelocityResponseWriter. A Velocity template can be
    provided through Velocity templates in a configset `velocity/ directory or as
    a parameter. A user defined configset could contain renderable, potentially malicious,
    templates. Parameter provided templates are disabled by default, but can be enabled
    by setting `params.resource.loader.enabled by defining a response writer with
    that setting set to `true`. Defining a response writer requires configuration
    API access. Solr 8.4 removed the params resource loader entirely, and only enables
    the configset-provided template rendering when the configset is `trusted` (has
    been uploaded by an authenticated user).
  impact: 'Successful exploitation of this vulnerability allows an attacker to execute
    arbitrary code on the affected system.

    '
  metadata:
    fofa-query:
    - title="solr admin"
    - title="apache solr"
    google-query:
    - intitle:"apache solr"
    - intitle:"solr admin"
    max-request: 3
    product: solr
    shodan-query:
    - cpe:"cpe:2.3:a:apache:solr"
    - http.title:"apache solr"
    - http.title:"solr admin"
    vendor: apache
  name: Apache Solr <=8.3.1 - Remote Code Execution
  reference:
  - https://issues.apache.org/jira/browse/SOLR-13971
  - https://nvd.nist.gov/vuln/detail/CVE-2019-17558
  - https://lists.apache.org/thread.html/rb964fe5c4e3fc05f75e8f74bf6b885f456b7a7750c36e9a8045c627a@%3Cissues.lucene.apache.org%3E
  - http://packetstormsecurity.com/files/157078/Apache-Solr-8.3.0-Velocity-Template-Remote-Code-Execution.html
  - https://lists.apache.org/thread.html/r0b7b9d4113e6ec1ae1d3d0898c645f758511107ea44f0f3a1210c5d5@%3Cissues.lucene.apache.org%3E
  remediation: 'Upgrade to a patched version of Apache Solr (8.4.0 or later) to mitigate
    this vulnerability.

    '
  severity: high
  tags: cve,cve2019,kev,packetstorm,apache,rce,solr,oast,vkev,vuln
