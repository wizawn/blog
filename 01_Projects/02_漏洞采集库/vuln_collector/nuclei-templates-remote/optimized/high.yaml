    internal: true
    name: url
    regex:
    - jkit_ajax_url = "(http[s]?://[^"]+)"
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "jeg-elementor-kit")
    - contains(content_type, "text/html")
    internal: true
    type: dsl
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded

