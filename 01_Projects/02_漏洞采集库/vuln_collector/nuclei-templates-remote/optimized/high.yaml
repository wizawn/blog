    epss-percentile: 0.98767
    epss-score: 0.73456
  description: 'MobSF is vulnerable to an issue with apktool (CVE-2024-21633) that
    allows for RCE or arbitrary file writing. It does this through a path traversal
    vulnerability. This template tests for it by writing to a local file and reading
    that file. RCE can be achieved by overwriting jadx, as shown in the two POCs listed
    as references. The payload for this template exists inside the binary format of
    an APK, which is a zip file. This means that a hardcoded random hex string is
    checked for, rather than a standard dynamic random string.

    '
  impact: 'Successful exploitation of the RCE version of this vulnerability can lead
    to unauthorized access to the MobSF instance, which could leak private intellectual
    property or deny access to part of the application.

    '
  metadata:
    fofa-query: title="MobSF"
    max-request: 4
    product: mobile-security-framework
    vendor: mobsf_project
    verified: true
