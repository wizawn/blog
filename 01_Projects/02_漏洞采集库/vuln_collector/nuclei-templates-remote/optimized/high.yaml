info:
  author: lbb
  description: 'SpringBlade is a comprehensive project upgraded and optimized from
    a commercial-grade project, featuring both a SpringCloud distributed microservice
    architecture and a SpringBoot monolithic microservice architecture. The SpringBlade
    framework has a default SIGN_KEY, which can be exploited by attackers to obtain
    sensitive information such as user account password logs.

    '
  impact: 'Attackers using default SIGN_KEY can forge JWT tokens to obtain sensitive
    user information including account credentials, password hashes, and logs from
    the SpringBlade system.

    '
  metadata:
    max-request: 3
  name: SpringBlade - Information Leakage
  reference:
  - https://github.com/chillzhuang/blade-tool
  remediation: 'Change the default SIGN_KEY to a strong, unique value in the SpringBlade
    configuration.

    '
  severity: high
  tags: cve,cve2021,springblade,blade,info-leak,vuln
