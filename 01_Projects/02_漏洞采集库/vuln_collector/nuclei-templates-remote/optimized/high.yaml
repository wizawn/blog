  - https://github.com/ShokoAnime/ShokoServer/commit/6c57ba0f073d6be5a4f508c46c2ce36727cbce80
  remediation: 'The `/api/Image/WithPath` endpoint has been removed in commit `6c57ba0f0`
    which will be included in subsequent releases. Users should limit access to the
