- matchers:
  - internal: true
    name: token
    part: body
    regex:
    - xoxb-[0-9A-Za-z\\-]{52}
    - (xoxb-[0-9]{10,13}\-[0-9]{10,13}[a-zA-Z0-9-]*)
    type: regex
