info:
  author: matejsmycka
  description: 'The Atlona AT-OME-MS42, a 4x2 matrix switcher supporting HDMI, USB-C,
    and DisplayPort inputs, is accessible via a built-in web management interface.
    By default, this interface uses the factory-set credentials admin:Atlona. If left
    unchanged, attackers could gain unauthorized administrative access to the device,
    potentially allowing them to alter configurations, disrupt AV switching, or pivot
    further into the network.

    '
  name: Atlona AT-OME-MS42 - Default Login
  reference:
  - https://atlona.com/pdf/manuals/AT-OME-MS42_G.pdf
  severity: high
  tags: atlona,default-login,vuln
---
http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '"success":"true"'
    - '"cookie":"sessionId='
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /goform/login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    username={{username}}&password={{password}}

    '
id: enviromuux-default-login
info:
  author: M.Sarmad Shafiq
  description: 'The ENVIROMUX environment monitoring system from Network Technologies
    Inc was found to be using its default login credentials. This default configuration
    could have allowed unauthorized users to gain access to the web management interface
    without authentication, potentially leading to information disclosure or unauthorized
    control over environmental monitoring systems.

    '
  metadata:
    fofa-query: body="ENVIROMUX"
    max-request: 1
    shodan-query: html:"ENVIROMUX"
    verified: true
  name: Network Technologies Inc ENVIROMUX - Default Login
  reference:
  - http://www.networktechinc.com/download/d-environment-monitor-16.html
  - http://www.networktechinc.com/pdf/man154.pdf
  severity: high
  tags: default-login,networktechnologies,enviromux,vuln
variables:
  password: nti
  username: root
---
http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body,"user_id","id")
    - contains(content_type,"application/json")
    type: dsl
  raw:
  - "POST /api/sessions HTTP/1.1\nHost: {{Hostname}}\nContent-Type: application/json\n\
    \n{\n  \"email\": \"{{username}}\",\n  \"password\": \"{{password}}\"\n}\n"
id: joplin-default-login
info:
  author: pussycat0x
  description: 'Joplin Server installations are vulnerable to default administrative
    credentials. The system ships with a default admin account using the credentials
    admin@localhost:admin. Attackers can leverage these default credentials to gain
    administrative access to the Joplin Server instance, potentially compromising
    sensitive user data and system functionality.

    '
  metadata:
    max-request: 1
    shodan-query: title:"Joplin Server"
    verified: true
  name: Joplin - Default Login
  severity: high
  tags: joplin,oss,default-login,vuln
variables:
  password: admin
  username: admin@localhost
---
http:
- attack: pitchfork
  matchers:
  - status:
    - 200
    type: status
  - condition: and
    type: word
    words:
    - data":{"token"
    - '"code":20000'
  matchers-condition: and
  payloads:
    pass:
    - 123456
    user:
    - admin
  raw:
  - 'POST /api/v1/user/login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"username":"{{user}}","password":"{{pass}}"}

    '
