id: CVE-2022-32430
info:
  author: DhiyaneshDK
  classification:
    cpe: cpe:2.3:a:talelin:lin-cms-spring-boot:0.2.1:*:*:*:*:*:*:*
    cve-id: CVE-2022-32430
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    epss-percentile: 0.98974
    epss-score: 0.77891
  description: 'An access control issue in Lin CMS Spring Boot v0.2.1 allows attackers
    to access the backend information and functions within the application.

    '
  impact: 'Unauthenticated attackers can access backend administrative information
    and functions using a hardcoded default JWT token, potentially gaining complete
    control over the Lin CMS Spring Boot application including user management and
    content administration.

    '
  metadata:
    fofa-query: body="心上无垢，林间有风"
    max-request: 1
    product: lin-cms-spring-boot
    shodan-query: http.html:"心上无垢，林间有风"
    vendor: talelin
    verified: true
  name: Lin CMS Spring Boot - Default JWT Token
  reference:
  - https://github.com/TaleLin/lin-cms-spring-boot
  - https://web.archive.org/web/20220721190946/https://www.mesec.cn/archives/277
  - https://nvd.nist.gov/vuln/detail/CVE-2022-32430
  remediation: 'Update Lin CMS Spring Boot to a version later than 0.2.1 that uses
    unique JWT secret keys, removes hardcoded tokens, and implements proper token
    rotation.

    '
  severity: high
  tags: cve,cve2022,lin-cms,auth-bypass,talelin,vuln
