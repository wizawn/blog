    epss-percentile: 0.96325
    epss-score: 0.27711
  description: 'The Uncanny Automator - Easy Automation, Integration, Webhooks & Workflow
    Builder Plugin for WordPress is vulnerable to Privilege Escalation in all versions
    up to, and including, 6.3.0.2. This is due to add_role() and user_role() functions
    missing proper capability checks performed through the validate_rest_call() function.
    This makes it possible for unauthenticated attackers to set the role of arbitrary
    users to administrator granting full access to the site, though privilege escalation
    requires an active account on the site so this is considered an authenticated
    privilege escalation.

    '
  impact: 'Authenticated attackers with subscriber-level access can escalate their
    privileges to administrator through missing capability checks, gaining full control
    over the WordPress site.

    '
  metadata:
    fofa-query: body="/wp-content/plugins/uncanny-automator/"
    max-request: 4
    publicwww-query: /wp-content/plugins/uncanny-automator/
    verified: true
  name: Uncanny Automator <= 6.3.0.2 - Missing Authorization to Authenticated (Subscriber+)
    Privilege Escalation
  reference:
  - https://www.wordfence.com/blog/2025/04/50000-wordpress-sites-affected-by-privilege-escalation-vulnerability-in-uncanny-automator-wordpress-plugin/
  - https://plugins.trac.wordpress.org/changeset/3257300/uncanny-automator/trunk/src/core/classes/class-background-actions.php
  - https://plugins.trac.wordpress.org/changeset/3265280/uncanny-automator/trunk/src/core/classes/class-background-actions.php
  - https://nvd.nist.gov/vuln/detail/CVE-2025-2075
  remediation: 'Update to version 6.4.0 or later to remediate this vulnerability.

    '
  severity: high
  tags: cve,cve2025,wordpress,wp-plugin,authenticated,wp,uncanny-automator,vuln,vkev
