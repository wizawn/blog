id: CVE-2019-0193
info:
  author: pdteam
  classification:
    cpe: cpe:2.3:a:apache:solr:*:*:*:*:*:*:*:*
    cve-id: CVE-2019-0193
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:H/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 7.2
    cwe-id: CWE-94
    epss-percentile: 0.99789
    epss-score: 0.93202
  description: 'Apache Solr is vulnerable to remote code execution vulnerabilities
    via the DataImportHandler, an optional but popular module to pull in data from
    databases and other sources. The module has a feature in which the whole DIH configuration
    can come from a request''s "dataConfig" parameter. The debug mode of the DIH admin
    screen uses this to allow convenient debugging / development of a DIH config.
    Since a DIH config can contain scripts, this parameter is a security risk.

    '
  impact: 'Successful exploitation of this vulnerability could lead to remote code
    execution, allowing an attacker to execute arbitrary commands on the affected
    system.

    '
  metadata:
    fofa-query:
    - title="solr admin"
    - title="apache solr"
    google-query:
    - intitle:"apache solr"
    - intitle:"solr admin"
    max-request: 2
    product: solr
    shodan-query:
    - cpe:"cpe:2.3:a:apache:solr"
    - http.title:"apache solr"
    - http.title:"solr admin"
    vendor: apache
  name: Apache Solr DataImportHandler <8.2.0 - Remote Code Execution
  reference:
  - https://github.com/vulhub/vulhub/tree/master/solr/CVE-2019-0193
  - https://paper.seebug.org/1009/
  - https://issues.apache.org/jira/browse/SOLR-13669
  - https://nvd.nist.gov/vuln/detail/CVE-2019-0193
  - https://lists.apache.org/thread.html/1addbb49a1fc0947fb32ca663d76d93cfaade35a4848a76d4b4ded9c@%3Cissues.lucene.apache.org%3E
  remediation: 'Starting with version 8.2.0 of Solr, use of this parameter requires
    setting the Java System property "enable.dih.dataConfigParam" to true.

    '
  severity: high
  tags: cve2019,cve,apache,rce,solr,oast,kev,vulhub,vkev,vuln
