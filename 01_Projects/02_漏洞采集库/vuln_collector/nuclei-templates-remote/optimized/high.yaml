    cvss-score: 7.5
    cwe-id: CWE-89
    epss-percentile: 0.99723
    epss-score: 0.92427
  description: 'woocommerce-gutenberg-products-block is a feature plugin for WooCommerce
    Gutenberg Blocks. An SQL injection vulnerability impacts all WooCommerce sites
    running the WooCommerce Blocks feature plugin between version 2.5.0 and prior
    to version 2.5.16. Via a carefully crafted URL, an exploit can be executed against
    the `wc/store/products/collection-data?calculate_attribute_counts[][taxonomy]`
    endpoint that allows the execution of a read only sql query. There are patches
    for many versions of this package, starting with version 2.5.16. There are no
    known workarounds aside from upgrading.

    '
  impact: 'Successful exploitation of this vulnerability can lead to unauthorized
    access, data leakage, and potential compromise of the affected system.

    '
  metadata:
    framework: wordpress
    max-request: 1
    product: woocommerce_blocks
    vendor: automattic
  name: WooCommerce Blocks 2.5 to 5.5 - Unauthenticated SQL Injection
  reference:
  - https://woocommerce.com/posts/critical-vulnerability-detected-july-2021
  - https://viblo.asia/p/phan-tich-loi-unauthen-sql-injection-woocommerce-naQZRQyQKvx
  - https://securitynews.sonicwall.com/xmlpost/wordpress-woocommerce-plugin-sql-injection/
  - https://wpscan.com/vulnerability/0f2089dc-9376-4d7d-95a2-25c99526804a
  - https://nvd.nist.gov/vuln/detail/CVE-2021-32789
  remediation: 'Update WooCommerce Blocks to version 5.6 or later to mitigate the
    vulnerability.

    '
  severity: high
  tags: cve2021,cve,wordpress,woocommerce,sqli,wp-plugin,wp,wpscan,automattic,vkev,vuln
