info:
  author: daffainfo
  classification:
    cpe: cpe:2.3:a:guralp:man-eam-0003:3.2.4:*:*:*:*:*:*:*
    cve-id: CVE-2022-38840
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-611
    epss-percentile: 0.99245
    epss-score: 0.83277
  description: 'cgi-bin/xmlstatus.cgi in Güralp MAN-EAM-0003 3.2.4 is vulnerable to
    an XML External Entity (XXE) issue via XML file upload, which leads to local file
    disclosure.

    '
  impact: 'Unauthenticated attackers can exploit XXE vulnerabilities in the xmlstatus.cgi
    component to read arbitrary files from the seismic monitoring system, potentially
    accessing sensitive configuration data and system credentials.

    '
  metadata:
    google-query: webconfig menu.cgi
    max-request: 1
    product: man-eam-0003
    vendor: guralp
    verified: true
  name: Güralp MAN-EAM-0003 3.2.4 - XML External Entity (XXE)
  reference:
  - https://www.exploit-db.com/exploits/51037
  - https://nvd.nist.gov/vuln/detail/CVE-2022-38840
  remediation: 'Update Güralp MAN-EAM-0003 to a version newer than 3.2.4 that disables
    external entity processing in XML parsers and validates uploaded XML files.

    '
  severity: high
  tags: cve,cve2022,guralp,man-eam-0003,xxe,vkev,vuln
