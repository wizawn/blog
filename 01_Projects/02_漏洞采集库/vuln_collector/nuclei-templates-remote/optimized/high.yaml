id: CVE-2019-19823
info:
  author: ritikchaddha
  classification:
    cve-id: CVE-2019-19823
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-306
    epss-percentile: 0.96928
    epss-score: 0.35198
  description: 'A certain router administration interface using Realtek APMIB (e.g.,
    on TOTOLINK models) allows unauthenticated remote attackers to disclose the entire
    router configuration, including sensitive credentials, via accessing the "config.dat"
    file. Affected devices include TOTOLINK A3002RU through 2.0.0, A702R through 2.1.3,
    N301RT through 2.1.6, N302R through 3.4.0, N300RT through 3.4.0, N200RE through
    4.0.0, N150RT through 3.4.0, N100RE through 3.4.0, and other Realtek SDK-based
    devices.

    '
  impact: 'Unauthenticated attackers can retrieve the entire router configuration
    including Wi-Fi passwords, admin credentials, and network settings, enabling complete
    network takeover.

    '
  metadata:
    fofa-query: title="totolink"
    max-requests: 1
    vendor: totolink
    verified: true
  name: TOTOLINK/Realtek Routers - Information Disclosure
  reference:
  - http://packetstormsecurity.com/files/156083/Realtek-SDK-Information-Disclosure-Code-Execution.html
  - https://nvd.nist.gov/vuln/detail/CVE-2019-19822
  remediation: 'Upgrade to firmware versions beyond those listed as vulnerable, or
    replace affected devices with patched alternatives.

    '
  severity: high
  tags: cve,cve2019,totolink,realtek,exposure,config,boa
