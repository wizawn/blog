  - condition: or
    part: body
    type: word
    words:
    - client_id
    - client_secret
    - access_token
    - refresh_token
    - password
    - aws_access_key_id
  - negative: true
    part: body
    type: word
    words:
    - <html
    - <body
    - <!DOCTYPE
    - <script
