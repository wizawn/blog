    to time-based SQL Injection via the cats and tags query parameters in all versions
    up to, and including, 4.24.4 (Free) and <= 2.27.4 (Premium) due to insufficient
    escaping on the user supplied parameter and lack of sufficient preparation on
    the existing SQL query. This makes it possible for unauthenticated attackers to
    append additional SQL queries to already existing queries that can be used to
    extract sensitive information from the database.

    '
