    cve-id: CVE-2020-3452
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-22,CWE-20
    epss-percentile: 0.99991
    epss-score: 0.94452
  description: 'Cisco Adaptive Security Appliance (ASA) Software and Cisco Firepower
    Threat Defense (FTD) Software is vulnerable to local file inclusion due to directory
    traversal attacks that can read sensitive files on a targeted system because of
    a lack of proper input validation of URLs in HTTP requests processed by an affected
    device. An attacker could exploit this vulnerability by sending a crafted HTTP
    request containing directory traversal character sequences to an affected device.
    A successful exploit could allow the attacker to view arbitrary files within the
    web services file system on the targeted device. The web services file system
    is enabled when the affected device is configured with either WebVPN or AnyConnect
    features. This vulnerability cannot be used to obtain access to ASA or FTD system
    files or underlying operating system (OS) files.

    '
  impact: 'An attacker can exploit this vulnerability to read sensitive files on the
    affected system.

    '
  metadata:
    max-request: 2
    product: asa_5505
    vendor: cisco
