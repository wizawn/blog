id: CVE-2025-31489
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    epss-percentile: 0.89305
    epss-score: 0.04852
  description: 'MinIO is a High Performance Object Storage released under GNU Affero
    General Public License v3.0. The signature component of the authorization may
    be invalid, which would mean that as a client you can use any arbitrary secret
    to upload objects given the user already has prior WRITE permissions on the bucket.
    Prior knowledge of access-key, and bucket name this user might have access

    to - and an access-key with a WRITE permissions is necessary. However with relevant
    information in place, uploading random objects to buckets is trivial and easy
    via curl.

    '
  impact: 'Attackers with knowledge of valid access keys can upload arbitrary objects
    to MinIO buckets using invalid signatures, potentially compromising data integrity
    and availability.

    '
  metadata:
    fofa-query:
    - app="minio-console"
    - title="minio console"
    google-query: intitle:"minio console"
    max-request: 1
    product: console
