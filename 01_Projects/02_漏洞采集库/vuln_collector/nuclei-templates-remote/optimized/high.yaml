id: CVE-2026-22200
info:
  author: DhiyaneshDk
  classification:
    cve-id: CVE-2026-22200
    cwe-id: CWE-74
    epss-percentile: 0.95069
    epss-score: 0.18472
  description: 'Enhancesoft osTicket versions 1.18.x prior to 1.18.3 and 1.17.x prior
    to 1.17.7 contain an arbitrary file read vulnerability in the ticket PDF export
    functionality. A remote attacker can submit a ticket containing crafted rich-text
    HTML that includes PHP filter expressions which are insufficiently sanitized before
    being processed by the mPDF PDF generator during export. When the attacker exports
    the ticket to PDF, the generated PDF can embed the contents of attacker-selected
    files from the server filesystem as bitmap images, allowing disclosure of sensitive
    local files in the context of the osTicket application user. This issue is exploitable
    in default configurations where guests may create tickets and access ticket status,
    or where self-registration is enabled.

    '
  impact: 'Remote attackers can read sensitive local files, leading to information
    disclosure within the osTicket application context.

    '
  metadata:
    max-request: 2
    product: osticket
    shodan-query: html:"osTicket"
    vendor: osticket
    verified: true
  name: osTicket - Arbitrary File Read
  reference:
  - https://horizon3.ai/attack-research/attack-blogs/ticket-to-shell-exploiting-php-filters-and-cnext-in-osticket-cve-2026-22200/
  - https://github.com/horizon3ai/CVE-2026-22200/blob/main/check.py
  - https://nvd.nist.gov/vuln/detail/CVE-2026-22200
  remediation: 'Update to a version later than 1.18.2 or the latest available version.

    '
  severity: high
  tags: cve,cve2026,osticket,lfi,passive
