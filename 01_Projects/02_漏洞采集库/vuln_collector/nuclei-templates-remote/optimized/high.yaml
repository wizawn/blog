  remediation: 'Ensure that the `.travis.yml` file is not deployed with the application
    or, at least, is not exposed in a web server directory by setting proper permissions
    on it. If sensitive information like credentials are leaked in the exposed file,
    they should be revoked and reset on the affected assets.

    '
