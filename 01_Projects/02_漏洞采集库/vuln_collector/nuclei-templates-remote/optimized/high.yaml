id: CVE-2025-52472
info:
  author: ritikchaddha
  classification:
    cpe: cpe:2.3:a:xwiki:xwiki:*:*:*:*:*:*:*:*
    cve-id: CVE-2025-52472
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-89
    epss-percentile: 0.64414
    epss-score: 0.00477
  description: 'XWiki is vulnerable to Hibernate Query Language (HQL) injection in
    the wiki and space search REST API starting in version 4.3-milestone-1 and prior
    to versions 16.10.9, 17.4.2, and 17.5.0. The vulnerability allows attackers to
    inject malicious HQL queries through the orderField parameter, potentially leading
    to data extraction, authentication bypass, or remote code execution depending
    on database backend and configuration.

    '
  impact: 'Unauthenticated attackers can inject malicious HQL queries through the
    orderField parameter, potentially leading to complete database compromise, data
    extraction, authentication bypass, or remote code execution.

    '
  metadata:
    fofa-query: body="data-xwiki-reference"
    max-request: 1
    product: xwiki
    shodan-query: html:"data-xwiki-reference"
    vendor: xwiki
    verified: true
  name: XWiki - HQL Injection
  reference:
  - https://jira.xwiki.org/browse/XWIKI-23247
  - https://nvd.nist.gov/vuln/detail/CVE-2025-52472
  remediation: 'Update XWiki to a version that patches this vulnerability. Review
    and sanitize all user-controlled parameters that are used in database queries,
    especially those passed to HQL queries.

    '
  severity: high
  tags: cve,cve2025,xwiki,hqli,sqli,vkev
