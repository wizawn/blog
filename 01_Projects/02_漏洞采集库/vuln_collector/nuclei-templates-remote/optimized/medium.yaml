  - https://github.com/prometheus/prometheus/releases/tag/v2.26.1
  - https://github.com/prometheus/prometheus/releases/tag/v2.27.1
  - https://nvd.nist.gov/vuln/detail/CVE-2021-29622
  - https://github.com/d4n-sec/d4n-sec.github.io
  remediation: The issue was patched in the 2.26.1 and 2.27.1 releases. In 2.28.0,
    the /new endpoint will be removed completely. The workaround is to disable access
    to /new via a reverse proxy in front of Prometheus.
  severity: medium
  tags: cve2021,cve,prometheus,redirect,vuln
