id: CVE-2025-53771
info:
  author: _l0gg,SamIntruder,sfewer-r7,iamnoooob,pdresearch
  classification:
    cve-id: CVE-2025-53771
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:L/A:N
    cvss-score: 6.5
    cwe-id: CWE-287
    epss-percentile: 0.97018
    epss-score: 0.3649
  description: 'Microsoft Office SharePoint Server contains an improper authentication
    vulnerability that allows unauthorized attackers to perform spoofing over a network.
    By crafting a POST request to /_layouts/15/ToolPane.aspx with a forged Referer
    header (/_layouts/SignOut.aspx), attackers can bypass authentication mechanisms
    and gain unauthorized access to protected endpoints. This vulnerability is part
    of the ToolShell exploit chain and is a patch bypass for CVE-2025-49706. When
    chained with CVE-2025-53770 (deserialization vulnerability), it enables unauthenticated
    remote code execution on SharePoint Server.

    '
  impact: 'Unauthenticated attackers can bypass SharePoint authentication controls
    by spoofing the Referer header, gaining unauthorized access to protected administrative
    endpoints. When combined with CVE-2025-53770, this leads to full remote code execution
    and system compromise.

    '
  metadata:
    max-request: 1
    shodan-query: http.component:"sharepoint"
    verified: true
  name: Microsoft SharePoint Server - Authentication Bypass (ToolShell)
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2025-53771
  - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2025-53771
  - https://www.wiz.io/blog/sharepoint-vulnerabilities-cve-2025-53770-cve-2025-53771-everything-you-need-to-k
  - https://orca.security/resources/blog/toolshell-sharepoint-exploit-cve-2025-53770-53771/
  - https://github.com/rapid7/metasploit-framework/blob/master/modules/exploits/windows/http/sharepoint_toolpane_rce.rb
  remediation: 'Apply the latest security patches from Microsoft released on July
    21, 2025. Additionally, rotate ASP.NET MachineKey values (ValidationKey and DecryptionKey)
    on all SharePoint servers using Set-SPMachineKey or Update-SPMachineKey, then
    restart IIS.

    '
  severity: medium
  tags: cve,cve2025,sharepoint,auth-bypass,microsoft,toolshell,vkev,vuln
javascript:
- args:
    dg: '{{dataset_gadget_b64}}'
