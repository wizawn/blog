id: CVE-2022-2462
info:
  author: dwisiswant0
  classification:
    cpe: cpe:2.3:a:transposh:transposh_wordpress_translation:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2022-2462
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-200
    epss-percentile: 0.88225
    epss-score: 0.04027
  description: 'WordPress Transposh plugin through is susceptible to information disclosure
    via the AJAX action tp_history, which is intended to return data about who has
    translated a text given by the token parameter. However, the plugin also returns
    the user''s login name as part of the user_login attribute.  If an anonymous user
    submits the translation, the user''s IP address is returned. An attacker can leak
    the WordPress username of translators and potentially execute other unauthorized
    operations.

    '
  impact: 'An attacker can exploit this vulnerability to gain sensitive information
    from the target system.

    '
  metadata:
    framework: wordpress
    max-request: 1
    product: transposh_wordpress_translation
    vendor: transposh
  name: WordPress Transposh <=1.0.8.1 - Information Disclosure
  reference:
  - https://packetstormsecurity.com/files/167878/wptransposh1081-disclose.txt
  - https://github.com/oferwald/transposh
  - https://www.rcesecurity.com/2022/07/WordPress-Transposh-Exploiting-a-Blind-SQL-Injection-via-XSS/
  - https://www.wordfence.com/vulnerability-advisories/#CVE-2022-2462
  - https://nvd.nist.gov/vuln/detail/CVE-2022-2462
  remediation: 'Upgrade to the latest version of the WordPress Transposh plugin (>=1.0.8.2)
    to mitigate this vulnerability.

    '
  severity: medium
  tags: cve,cve2022,wordpress,disclosure,wp-plugin,packetstorm,transposh,xss,vuln
