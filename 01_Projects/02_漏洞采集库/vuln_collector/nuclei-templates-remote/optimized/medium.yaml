  description: 'Wing FTP Server versions prior to 7.4.4 are vulnerable to an authenticated
    information disclosure vulnerability (CVE-2025-47813).

    The vulnerability occurs due to improper validation of the ''UID'' session cookie
    in the /loginok.html endpoint. Supplying an

    overlong UID value causes the server to respond with an error that includes the
    full local filesystem path. This can aid in further

    exploitation (e.g., CVE-2025-47812) by revealing the application’s file system
    layout.

    '
  impact: 'Authenticated attackers can supply an overlong UID cookie value to trigger
    error responses that disclose the full local filesystem path, aiding in further
    exploitation attempts.

    '
