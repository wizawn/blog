id: CVE-2025-27112
info:
  author: iamnoooob,rootxharsh,pdresearch
  classification:
    cpe: cpe:2.3:a:navidrome:navidrome:*:*:*:*:*:go:*:*
    cve-id: CVE-2025-27112
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:L/A:N
    cvss-score: 6.5
    cwe-id: CWE-287
    epss-percentile: 0.93874
    epss-score: 0.12881
  description: 'Navidrome is an open source web-based music collection server and
    streamer. Starting in version 0.52.0 and prior to version 0.54.5, in certain Subsonic
    API endpoints, a flaw in the authentication check process allows an attacker to
    specify any arbitrary username that does not exist on the system, along with a
    salted hash of an empty password. Under these conditions, Navidrome treats the
    request as authenticated, granting access to various Subsonic endpoints without
    requiring valid credentials. An attacker can use any non-existent username to
    bypass the authentication system and gain access to various read-only data in
    Navidrome, such as user playlists. However, any attempt to modify data fails with
    a "permission denied" error due to insufficient permissions, limiting the impact
    to unauthorized viewing of information. Version 0.54.5 contains a patch for this
    issue.

    '
  impact: 'Attackers can bypass authentication using non-existent usernames and empty
    password hashes to gain read-only access to user playlists and other data through
    Subsonic API endpoints.

    '
  metadata:
    framework: go
    max-request: 1
    product: navidrome
    shodan-query: html:"content="Navidrome""
    vendor: navidrome
    verified: true
  name: Navidrome <=0.54.5 - Authentication Bypass in Subsonic API
  reference:
  - https://github.com/advisories/GHSA-c3p4-vm8f-386p
  remediation: 'Upgrade to Navidrome version 0.54.5 or later that properly validates
    authentication credentials.

    '
  severity: medium
  tags: cve,cve2025,navidrome,vkev,vuln
