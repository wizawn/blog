id: CVE-2024-50334
info:
  author: xbow,iamnoooob,pdresearch
  classification:
    cpe: cpe:2.3:a:erudika:scoold:*:*:*:*:*:*:*:*
    cve-id: CVE-2024-50334
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-288
    epss-percentile: 0.91726
    epss-score: 0.07703
  description: 'Scoold is a Q&A and a knowledge sharing platform for teams. A semicolon
    path injection vulnerability was found on the /api;/config endpoint. By appending
    a semicolon in the URL, attackers can bypass authentication and gain unauthorised
    access to sensitive configuration data. Furthermore, PUT requests on the /api;/config
    endpoint while setting the Content-Type- application/hocon header allow unauthenticated
    attackers to file reading via HOCON file inclusion. This allows attackers to retrieve
    sensitive information such as configuration files from the server, which can be
    leveraged for further exploitation. The vulnerability has been fixed in Scoold
    1.64.0. A workaround would be to disable the Scoold API with scoold.api_enabled
    = false.

    '
  impact: 'Attackers can bypass authentication and read sensitive configuration data
    from the Scoold API.

    '
  metadata:
    max-request: 1
    product: scoold
    shodan-query: html:"scoold-wrapper"
    vendor: erudika
    verified: true
  name: Scoold < 1.64.0 - Authentication Bypass
  reference:
  - https://xbow.com/blog/xbow-scoold-vuln/
  - https://nvd.nist.gov/vuln/detail/CVE-2024-50334
  - https://github.com/Erudika/scoold/releases/tag/1.64.0
  remediation: 'Update Scoold to version 1.64.0 or later, or disable the Scoold API
    with scoold.api_enabled = false.

    '
  severity: medium
  tags: cve,cve2024,scoold,info-leak,erudika,auth-bypass,vkev,vuln
