id: CVE-2024-51977
info:
  author: DhiyaneshDK,iamnoooob,darses
  classification:
    epss-percentile: 0.97196
    epss-score: 0.39511
  description: 'An unauthenticated attacker who can access either the HTTP service
    (TCP port 80), the HTTPS service (TCP port 443), or the IPP service (TCP port
    631), can leak several pieces of sensitive information from a vulnerable device.
    The URI path /etc/mnt_info.csv can be accessed via a GET request and no authentication
    is required. The returned result is a comma separated value (CSV) table of information.
    The leaked information includes the device’s model, firmware version, IP address,
    and serial number.

    '
  impact: 'Attackers can exploit this vulnerability to compromise system security.

    '
  metadata:
    fofa-query:
    - app="brother-Printer"
    max-request: 1
    shodan-query: html:"MFC-L9570CDW"
    verified: true
    zoomeye-query:
