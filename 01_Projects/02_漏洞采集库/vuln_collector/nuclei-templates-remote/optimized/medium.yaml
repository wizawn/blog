  - https://nvd.nist.gov/vuln/detail/CVE-2021-24316
  - https://github.com/ZephrFish/AutoHoneyPoC
  remediation: 'Update to the latest version of the WordPress Mediumish Theme plugin
    (1.0.47 or higher) to mitigate this vulnerability.

    '
  severity: medium
  tags: cve2021,cve,mediumish,xss,wordpress,wpscan,intrusive,wowthemes,vuln
