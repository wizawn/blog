id: CVE-2025-30208
info:
  author: v2htw,s4e-io
  classification:
    cve-id: CVE-2025-30208
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:H/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-284
    epss-percentile: 0.9947
    epss-score: 0.88123
  description: 'Vite, a provider of frontend development tooling, has a vulnerability
    in versions prior to 6.2.3, 6.1.2, 6.0.12, 5.4.15, and 4.5.10. `@fs` denies access
    to files outside of Vite serving allow list. Adding `?raw??` or `?import&raw??`
    to the URL bypasses this limitation and returns the file content if it exists.
    This bypass exists because trailing separators such as `?` are removed in several
    places, but are not accounted for in query string regexes. The contents of arbitrary
    files can be returned to the browser. Only apps explicitly exposing the Vite dev
    server to the network (using `--host` or `server.host` config option) are affected.
    Versions 6.2.3, 6.1.2, 6.0.12, 5.4.15, and 4.5.10 fix the issue.

    '
  impact: 'Attackers can bypass file access restrictions by adding special query parameters
    to URLs, potentially reading arbitrary files when the Vite dev server is exposed
    to the network.

    '
  metadata:
    fofa-query: body="/@vite/client"
    max-request: 1
    verified: true
  name: Vite - Arbitrary File Read
  reference:
  - https://github.com/vitejs/vite/security/advisories/GHSA-x574-m823-4x7w
  - https://nvd.nist.gov/vuln/detail/CVE-2025-30208
  remediation: 'Upgrade to Vite version 6.2.3, 6.1.2, 6.0.12, 5.4.15, or 4.5.10 that
    properly validates query parameters.

    '
  severity: medium
  tags: cve,cve2025,arbitrary-file-read,vite,CVE-2025-30208,vkev,vuln
