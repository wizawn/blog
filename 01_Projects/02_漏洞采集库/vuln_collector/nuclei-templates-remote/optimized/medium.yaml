    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 6.1
    cwe-id: CWE-79
    epss-percentile: 0.9045
    epss-score: 0.05959
  description: 'wp-live-chat-support plugin before 8.0.27 for WordPress contains a
    reflected cross-site scripting caused by insufficient sanitization in the GDPR
    page, letting attackers execute arbitrary scripts in the context of the victim''s
    browser, exploit requires victim to visit a malicious page.

    '
  impact: 'Attackers can execute arbitrary scripts in the victim''s browser, potentially
    leading to session hijacking or defacement.

    '
  metadata:
    framework: wordpress
    max-request: 2
    product: live_chat
    publicwww-query: /wp-content/plugins/wp-live-chat-support
    vendor: 3cx
    verified: true
  name: WP Live Chat Support <= 8.0.27 — Stored Cross-Site Scripting
  reference:
  - https://wordpress.org/plugins/wp-live-chat-support/#developers
  - https://blog.sucuri.net/2019/05/persistent-cross-site-scripting-in-wp-live-chat-support-plugin.html
  - https://nvd.nist.gov/vuln/detail/CVE-2019-14950
  remediation: 'Update to version 8.0.27 or later.

    '
  severity: medium
  tags: cve,cve2019,wordpress,wp,wp-plugin,wp-live-chat-support,xss,intrusive,vkev
