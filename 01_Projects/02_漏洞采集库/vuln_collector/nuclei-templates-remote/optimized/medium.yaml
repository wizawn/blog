id: CVE-2023-45671
info:
  author: ritikchaddha
  classification:
    cpe: cpe:2.3:a:frigate:frigate:*:*:*:*:*:*:*:*
    cve-id: CVE-2023-45671
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 4.7
    cwe-id: CWE-79
    epss-percentile: 0.96203
    epss-score: 0.26546
  description: 'Frigate is an open source network video recorder. Before version 0.13.0
    Beta 3, there is a reflected cross-site scripting vulnerability in any API endpoints
    reliant on the `/<camera_name>` base path as values provided for the path are
    not sanitized. Exploiting this vulnerability requires the attacker to both know
    very specific information about a user''s Frigate server and requires an authenticated
    user to be tricked into clicking a specially crafted link to their Frigate instance.
    This vulnerability could exploited by an attacker under the following circumstances:
    Frigate publicly exposed to the internet (even with authentication); attacker
    knows the address of a user''s Frigate instance; attacker crafts a specialized
    page which links to the user''s Frigate instance; attacker finds a way to get
    an authenticated user to visit their specialized page and click the button/link.
    As the reflected values included in the URL are not sanitized or escaped, this
    permits execution arbitrary Javascript payloads. Version 0.13.0 Beta 3 contains
    a patch for this issue.

    '
  impact: 'Authenticated attackers can inject malicious JavaScript through unsanitized
    camera_name path values in API endpoints to execute attacks against Frigate users
    when they click specially crafted links.

    '
  metadata:
    fofa-query: title="frigate"
    google-query: intitle:"frigate"
    max-request: 1
    product: frigate
    shodan-query:
    - title:"Frigate"
    - http.title:"frigate"
    vendor: frigate
    verified: true
  name: Frigate < 0.13.0 Beta 3 - Cross-Site Scripting
  reference:
  - https://github.com/blakeblackshear/frigate/security/advisories/GHSA-jjxc-m35j-p56f
  - https://nvd.nist.gov/vuln/detail/CVE-2023-45671
  - https://securitylab.github.com/advisories/GHSL-2023-190_Frigate/
  remediation: It has been fixed in version 0.13.0 Beta 3
  severity: medium
  tags: cve,cve2023,frigate,xss,vuln
