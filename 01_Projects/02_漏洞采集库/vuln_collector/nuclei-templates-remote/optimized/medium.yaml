id: CVE-2019-8943
info:
  author: sttlr
  classification:
    cpe: cpe:2.3:a:wordpress:wordpress:*:*:*:*:*:*:*:*
    cve-id: CVE-2019-8943
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:H/A:N
    cvss-score: 6.5
    cwe-id: CWE-22
    epss-percentile: 0.99867
    epss-score: 0.93889
  description: 'WordPress through 5.0.3 allows Path Traversal in wp_crop_image().
    An attacker (who has privileges to crop an image) can write the output image to
    an arbitrary directory via a filename containing two image extensions and ../
    sequences, such as a filename ending with the .jpg?/../../file.jpg substring.

    '
  impact: 'Authenticated attackers with image cropping privileges can write output
    images to arbitrary directories via path traversal, potentially overwriting critical
    system files or placing web shells in accessible locations.

    '
  metadata:
    fofa-query: body="oembed" && body="wp-"
    product: wordpress
    shodan-query:
    - http.component:"wordpress"
    - cpe:"cpe:2.3:a:wordpress:wordpress"
    vendor: wordpress
    verified: true
  name: WordPress Core 5.0.0 - Crop-image Shell Upload
  reference:
  - https://blog.ripstech.com/2019/wordpress-image-remote-code-execution/
  - http://packetstormsecurity.com/files/152396/WordPress-5.0.0-crop-image-Shell-Upload.html
  - http://packetstormsecurity.com/files/161213/WordPress-5.0.0-Remote-Code-Execution.html
  - http://www.rapid7.com/db/modules/exploit/multi/http/wp_crop_rce
  - https://tryhackme.com/r/room/blog
  remediation: 'Upgrade to WordPress version 5.0.4 or later.

    '
  severity: medium
  tags: cve,cve2019,wordpress,rce,intrusive,authenticated,packetstorm,wp-theme,vuln
