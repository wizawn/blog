  tags: exposure,gcs,google,cloud,bucket,misconfig
---
http:
- extractors:
  - group: 1
    name: bucket-name
    part: body
    regex:
    - <Name>([^<]+)</Name>
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "<ListBucketResult", "<Name>")
    - contains_any(tolower(header), "ibm-sse-kp-enabled", "ibm-sse-kp-customer-root-key-crn",
      "ibm-")
    - contains_any(tolower(content_type), "application/xml", "text/xml")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/?list-type=2'
  stop-at-first-match: true
