---
http:
- attack: pitchfork
  body: "{\n  \"jsonrpc\": \"2.0\",\n  \"method\": \"{{method}}\",\n  \"params\":\
    \ {},\n  \"id\": 1\n}\n"
  extractors:
  - part: body
    regex:
    - '"name"\s*:\s*"([^"]+)"'
    type: regex
  headers:
    Accept: application/json, text/event-stream
    Content-Type: application/json
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - jsonrpc
    - result
  - part: body
    regex:
    - '"available_tools"\s*:\s*\['
    - '"name"\s*:\s*"get_tools"'
    - '"server_status"\s*:\s*\{'
    - '"observatories_by_type"'
    - '"parameters"\s*:\s*\{'
    - '"tools"\s*:\s*\[.*?\]'
    - '"resources"\s*:\s*\[.*?\]'
    - '"prompts"\s*:\s*\[.*?\]'
    type: regex
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/mcp/'
  payloads:
    method:
    - rpc.discover
    - rpc.describe
    - rpc.listTools
    - tools/list
    - resources/list
    - prompts/list
    - tool.status
    - tool.help
    - tool.version
    - tool.list
id: exposed-mcp-server
info:
  author: ivan_wallarm
  description: 'Detects exposed Machine Control Protocol (MCP) servers through JSON-RPC
    2.0 API endpoints.

    MCP servers often provide administrative access to AI tools, LLM systems, or other
    automation infrastructure.

    Exposed MCP interfaces can lead to unauthorized access, information disclosure,
    and potential system compromise.

    This template tests multiple detection methods including tools/list, rpc.discover,
    resources/list, and prompts/list.

    '
  metadata:
    max-request: 10
    verified: true
  name: Exposed MCP JSON-RPC 2.0 API Detection
  reference:
  - https://jsonrpc.org/specification
  - https://github.com/anthropics/anthropic-tools/tree/main/mcp
  - https://lab.wallarm.com/wallarm-research-nuclei-template-counter-threats-targeting-llm-apps/
  severity: unknown
  tags: mcp,jsonrpc,devtools,exposure,api,ai,llm,discovery
---
http:
- extractors:
  - name: message_endpoint
    regex:
    - 'data: ([/?_=a-zA-Z0-9-]+)'
    type: regex
  matchers:
  - condition: or
    dsl:
    - status_code == 200 && contains(content_type, 'text/event-stream')
    - status_code == 406 && contains(content_type, 'application/json')
    type: dsl
  - condition: or
    dsl:
    - 'contains(body, ''event: endpoint'')'
    - 'contains(body, ''Not Acceptable: Client must accept text/event-stream'')'
    type: dsl
  max-size: 100
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/sse'
  stop-at-first-match: true
id: exposed-mcp-sse-server
info:
  author: domwhewell-sage
  description: 'Detects exposed Model Context Protocol (MCP) servers through the SSE
    API. MCP servers often provide administrative access to AI tools, LLM systems,
    or other automation infrastructure. Exposed MCP interfaces can lead to unauthorized
    access, information disclosure, and potential system compromise. This template
    detects a SSE server event stream and returns the messages endpoint which can
    be used to POST JSON-RPC 2.0 requests.

    '
  metadata:
    max-requests: 2
    shodan-query: text/event-stream
    verified: true
  name: MCP SSE API Exposed - Detect
  reference:
  - https://modelcontextprotocol.io/specification/2024-11-05/basic/transports#http-with-sse
  severity: unknown
  tags: mcp,devtools,exposure,api,ai,llm,discovery
---
http:
- matchers:
  - part: body
    type: word
    words:
    - REACT_APP_
  - condition: or
    part: header
    type: word
    words:
    - application/octet-stream
    - application/javascript
    - text/plain
  - status:
    - 200
