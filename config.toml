baseURL = 'https://blog.caowo.de/'
languageCode = 'zh-CN'
title = '言零的博客'
theme = 'stack'
contentDir = 'source'

[params]
  # 允许发布未来日期的文章
  enableFuturePages = true
  
  description = '专注于 Web 渗透测试、漏洞复现与安全防御技术分享'
  
  # 自动配图配置
  [params.cover]
    # 使用随机封面图（从 static/ 目录随机选择）
    autoAssign = true
    images = [
      "/static/security-cover.jpg",
      "/static/tech-cover-1.jpg",
      "/static/blog-cover-default.jpg"
    ]
  mainSections = ['posts']
  defaultImage = '/blog-cover-default.jpg'
  
  [params.header]
    title = '言零的博客'
    
  [params.footer]
    since = 2026
    
  # SEO 配置
  [params.seo]
    title = '言零的博客 - Web 渗透测试与安全研究'
    description = '专注于 Web 渗透测试、漏洞复现、SRC 挖洞与安全防御技术分享。提供 Nuclei 教程、SQLMap 指南、CVE 漏洞复现等实战内容。'
    keywords = ['Web 渗透测试', '漏洞复现', 'SRC 挖洞', '网络安全', 'Nuclei', 'SQLMap', 'CVE', '安全研究']
    author = '言零'
    
  # Open Graph / 社交媒体分享
  [params.opengraph]
    title = '言零的博客'
    description = '专注于 Web 渗透测试、漏洞复现与安全防御技术分享'
    image = '/blog-cover-default.jpg'
    
  # Cloudflare Web Analytics
  [params.cloudflareAnalytics]
    enabled = true
    token = "SDZvDCIq-3er2UKht5fIrl2UvvIrJxi6hZVxBfIa"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章 / Posts"
    url = "/posts/"
    weight = 1
    
  [[menu.main]]
    identifier = "categories"
    name = "分类 / Categories"
    url = "/categories/"
    weight = 2
    
  [[menu.main]]
    identifier = "tags"
    name = "标签 / Tags"
    url = "/tags/"
    weight = 3
    
  [[menu.main]]
    identifier = "about"
    name = "关于 / About"
    url = "/about/"
    weight = 4
    
  [[menu.main]]
    identifier = "links"
    name = "友链 / Links"
    url = "/links/"
    weight = 5

# 首页配置
[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]
