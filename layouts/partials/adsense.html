{{/* Google AdSense 广告 */}}

{{- if and .Site.Params.adsense.enabled .Site.Params.adsense.client -}}
{{- if ne .Site.Params.adsense.client "ca-pub-xxxxxxxxxxxxxxxx" -}}
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsense.client }}"
     crossorigin="anonymous"></script>

<!-- 文章底部广告位 -->
<div class="ads-container" style="margin: 30px 0; text-align: center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ .Site.Params.adsense.client }}"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>
{{- end -}}
{{- end -}}
