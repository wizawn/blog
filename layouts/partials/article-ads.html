{{/* 文章底部广告位 */}}

{{- if and .Site.Params.adsense.enabled .Site.Params.adsense.client -}}
{{- if ne .Site.Params.adsense.client "ca-pub-xxxxxxxxxxxxxxxx" -}}
<div class="ads-container" style="margin: 40px 0; padding: 20px; text-align: center; background: #f9f9f9; border-radius: 10px;">
  <p style="margin-bottom: 15px; color: #666; font-size: 0.9em;">📢 广告</p>
  <ins class="adsbygoogle"
       style="display:block; min-height: 250px;"
       data-ad-client="{{ .Site.Params.adsense.client }}"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>
{{- end -}}
{{- end -}}
