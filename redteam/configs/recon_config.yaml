# 🔒 Recon-Agent 配置
# 侦察兵 - 信息收集工具链配置

agent:
  name: Recon-Agent
  role: reconnaissance
  description: 信息收集与资产发现

# 工具配置
tools:
  subdomain_enum:
    enabled: true
    tools:
      - name: subfinder
        command: "subfinder -d {target} -o /tmp/subdomains_{target}.txt"
        timeout: 300
      
      - name: assetfinder
        command: "assetfinder {target} | tee /tmp/assetfinder_{target}.txt"
        timeout: 180
      
      - name: amass
        command: "amass enum -d {target} -o /tmp/amass_{target}.txt"
        timeout: 600
    
    # 暴力枚举字典
    wordlist: /root/.openclaw/workspace/redteam/tools/subdomains.txt
    common_subdomains:
      - www
      - api
      - admin
      - dev
      - test
      - staging
      - prod
      - mail
      - vpn
      - ftp

  port_scan:
    enabled: true
    tools:
      - name: nmap
        command: "nmap -sV -sC -oN /tmp/nmap_{target}.txt {target}"
        timeout: 600
        ports: "1-10000"
      
      - name: masscan
        command: "masscan -p1-65535 {target} --rate=1000 -oG /tmp/masscan_{target}.txt"
        timeout: 300
    
    # 常见端口列表
    common_ports:
      - 21    # FTP
      - 22    # SSH
      - 23    # Telnet
      - 25    # SMTP
      - 53    # DNS
      - 80    # HTTP
      - 110   # POP3
      - 143   # IMAP
      - 443   # HTTPS
      - 445   # SMB
      - 3306  # MySQL
      - 3389  # RDP
      - 5432  # PostgreSQL
      - 6379  # Redis
      - 8080  # HTTP-Alt
      - 27017 # MongoDB

  fingerprint:
    enabled: true
    tools:
      - name: whatweb
        command: "whatweb -v {target} -o /tmp/whatweb_{target}.json"
        timeout: 120
      
      - name: wappalyzer
        command: "wappalyzer {target} --output /tmp/wappalyzer_{target}.json"
        timeout: 120
      
      - name: nuclei
        command: "nuclei -u {target} -t technologies/ -o /tmp/nuclei_tech_{target}.txt"
        timeout: 300

  dns_recon:
    enabled: true
    tools:
      - name: dig
        command: "dig {target} ANY +noall +answer"
        timeout: 30
      
      - name: dnsrecon
        command: "dnsrecon -d {target} -o /tmp/dnsrecon_{target}.xml"
        timeout: 300
    
    record_types:
      - A
      - AAAA
      - MX
      - NS
      - TXT
      - CNAME
      - SOA
      - PTR

  whois:
    enabled: true
    command: "whois {target} | tee /tmp/whois_{target}.txt"
    timeout: 60

  screenshot:
    enabled: true
    tools:
      - name: aquatone
        command: "cat /tmp/subdomains_{target}.txt | aquatone -out /tmp/aquatone_{target}"
        timeout: 600

# 输出配置
output:
  directory: /root/.openclaw/workspace/redteam/output/artifacts
  formats:
    - json
    - txt
    - html
  
  # 自动清理临时文件
  cleanup_temp: true
  
  # 保存截图
  save_screenshots: true

# 速率限制 (避免被封禁)
rate_limit:
  requests_per_second: 10
  delay_between_requests: 0.1
  max_retries: 3
  timeout_seconds: 30

# 规避检测
stealth:
  random_user_agent: true
  rotate_proxies: false
  delay_range: [1, 3]  # 随机延迟秒数

# 通知配置
notifications:
  on_completion: true
  on_critical_finding: true
  channel: telegram  # 或 discord, slack

# 约束 (安全合规)
constraints:
  - authorized_testing_only
  - no_production_data_destruction
  - log_all_actions
  - respect_scope
