<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 网格装饰 -->
  <g stroke="#00d9ff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  
  <!-- 雷达扫描效果 -->
  <circle cx="900" cy="315" r="200" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="900" cy="315" r="150" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <circle cx="900" cy="315" r="100" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <circle cx="900" cy="315" r="50" fill="url(#accent)" opacity="0.6"/>
  
  <!-- 主标题 -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.9">
    ARL 灯塔实战
  </text>
  
  <!-- 副标题 -->
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="36" fill="url(#accent)">
    10,000+ 海外站点
  </text>
  
  <!-- 描述 -->
  <text x="100" y="340" font-family="Arial, sans-serif" font-size="28" fill="#cccccc">
    资产收集全记录
  </text>
  
  <!-- 数据统计 -->
  <g transform="translate(100, 420)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#00d9ff" text-anchor="middle">10,200</text>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">域名</text>
    
    <rect x="220" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="320" y="35" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#00ff88" text-anchor="middle">11,000</text>
    <text x="320" y="60" font-family="Arial, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">站点</text>
    
    <rect x="440" y="0" width="200" height="80" rx="10" fill="#ffffff" opacity="0.1"/>
    <text x="540" y="35" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ff9900" text-anchor="middle">9,800</text>
    <text x="540" y="60" font-family="Arial, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">IP</text>
  </g>
  
  <!-- 底部标签 -->
  <text x="100" y="580" font-family="Arial, sans-serif" font-size="20" fill="#666666">
    #ARL #资产收集 #海外站点 #SRC 挖洞 #Nuclei
  </text>
  
  <!-- 作者 -->
  <text x="1100" y="580" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="end">
    ClawSec © 2026
  </text>
</svg>
