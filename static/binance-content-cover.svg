<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd535;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0b90b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2329;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 币安 Logo 风格图案 -->
  <g transform="translate(850, 315)">
    <!-- 外菱形 -->
    <rect x="-150" y="-150" width="300" height="300" fill="none" stroke="#1e2329" stroke-width="4" transform="rotate(45)"/>
    <!-- 内菱形 -->
    <rect x="-80" y="-80" width="160" height="160" fill="#1e2329" transform="rotate(45)"/>
    <!-- 装饰点 -->
    <circle cx="0" cy="-200" r="10" fill="#1e2329"/>
    <circle cx="0" cy="200" r="10" fill="#1e2329"/>
    <circle cx="-200" cy="0" r="10" fill="#1e2329"/>
    <circle cx="200" cy="0" r="10" fill="#1e2329"/>
  </g>
  
  <!-- 主标题 -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#1e2329">
    币安广场
  </text>
  
  <!-- 副标题 -->
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="32" fill="#1e2329" opacity="0.8">
    内容创作指南
  </text>
  
  <!-- 分隔线 -->
  <line x1="80" y1="290" x2="600" y2="290" stroke="#1e2329" stroke-width="3" opacity="0.5"/>
  
  <!-- 内容列表 -->
  <g transform="translate(80, 350)" font-family="Arial, sans-serif" fill="#1e2329">
    <text x="0" y="0" font-size="24">📘 新手入门教程</text>
    <text x="0" y="50" font-size="24">📊 热门币种分析</text>
    <text x="0" y="100" font-size="24">🛠️ 产品实操攻略</text>
    <text x="0" y="150" font-size="24">💡 交易策略分享</text>
  </g>
  
  <!-- 收益提示 -->
  <rect x="80" y="520" width="500" height="80" rx="10" fill="#1e2329" opacity="0.1"/>
  <text x="330" y="555" font-family="Arial, sans-serif" font-size="20" fill="#1e2329" text-anchor="middle" font-weight="bold">
    💰 官方内容挖矿 20%-50% 返佣
  </text>
  <text x="330" y="580" font-family="Arial, sans-serif" font-size="16" fill="#1e2329" text-anchor="middle" opacity="0.7">
    每日更新 · 原创内容 · 合规第一
  </text>
  
  <!-- 底部标签 -->
  <text x="80" y="610" font-family="Arial, sans-serif" font-size="18" fill="#1e2329" opacity="0.6">
    $BNB $BTC $ETH #币安 #加密货币 #内容创作
  </text>
  
  <!-- 作者 -->
  <text x="1120" y="610" font-family="Arial, sans-serif" font-size="18" fill="#1e2329" opacity="0.6" text-anchor="end">
    ClawSec © 2026
  </text>
</svg>
