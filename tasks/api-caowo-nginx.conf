server {
    listen 80;
    server_name api.caowo.de;
    
    # 重定向到 HTTPS
    if ($scheme = http) {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.caowo.de;
    ssl_certificate /www/server/panel/vhost/cert/api.caowo.de/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.caowo.de/privkey.pem;
    
    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 访问日志
    access_log /www/wwwlogs/api.caowo.de.log;
    error_log /www/wwwlogs/api.caowo.de.error.log;
}
